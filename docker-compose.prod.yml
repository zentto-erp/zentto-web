version: '3.9'

# ── Zentto — docker-compose PRODUCCION ────────────────────────────────────────
# Usa imagenes pre-construidas desde ghcr.io (desplegadas por CI/CD)
# Uso en servidor: docker compose -f docker-compose.prod.yml up -d

services:
  api:
    image: ghcr.io/zentto-erp/zentto-web/api:latest
    container_name: zentto-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - /opt/zentto/.env.api
    environment:
      - CORS_ORIGINS=https://zentto.net,https://www.zentto.net,https://app.zentto.net
    volumes:
      - api_storage:/app/storage/media
    networks:
      - zentto-net

  frontend:
    image: ghcr.io/zentto-erp/zentto-web/frontend:latest
    container_name: zentto-frontend
    restart: unless-stopped
    ports:
      - "3000-3010:3000-3010"
    env_file:
      - /opt/zentto/.env.frontend
    environment:
      - NODE_ENV=production
      # Auth (shell app — runtime)
      - AUTH_TRUST_HOST=true
      - NEXTAUTH_URL=https://zentto.net
      # API URLs para SSR (server-side rendering en runtime)
      - BACKEND_URL=http://zentto-api:4000
      - API_URL=http://zentto-api:4000
    networks:
      - zentto-net

volumes:
  api_storage:
    external: true
    name: zentto_api_storage

networks:
  zentto-net:
    driver: bridge
