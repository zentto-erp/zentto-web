        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        200:
          description: Lista de proveedores
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                properties:
                  rows:
                    items:
                      $ref: '#/components/schemas/Proveedor'
    post:
      summary: Crear proveedor
      tags: [Proveedores]
      requestBody:
        required: true
        content:
          application/json:
            schema:
