      summary: Listar empleados
      tags: [Empleados]
      responses:
        200:
          description: Lista de empleados
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                properties:
                  rows:
                    items:
                      $ref: '#/components/schemas/Empleado'
    post:
      summary: Crear empleado
      tags: [Empleados]
      requestBody:
