    post:
      summary: Crear artículo
      tags: [Inventario]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Inventario'
      responses:
        201:
          description: Artículo creado

  /inventario/{codigo}:
    get:
      summary: Obtener artículo por código
      tags: [Inventario]
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
      responses:
