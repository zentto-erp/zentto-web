  # ============================================
  # VENDEDORES
  # ============================================
  /vendedores:
    get:
      summary: Listar vendedores
      tags: [Vendedores]
      responses:
        200:
          description: Lista de vendedores
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                properties:
                  rows:
                    items:
                      $ref: '#/components/schemas/Vendedor'
    post:
      summary: Crear vendedor
      tags: [Vendedores]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Vendedor'
      responses:
