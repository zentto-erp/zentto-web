  /proveedores/{codigo}:
    get:
      summary: Obtener proveedor por código
      tags: [Proveedores]
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Proveedor encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Proveedor'
    put:
      summary: Actualizar proveedor
      tags: [Proveedores]
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Proveedor'
      responses:
        200:
          description: Proveedor actualizado
    delete:
      summary: Eliminar proveedor
      tags: [Proveedores]
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Proveedor eliminado

  # ============================================
  # INVENTARIO
  # ============================================
  /inventario:
    get:
      summary: Listar inventario
      tags: [Inventario]
      parameters:
        - name: search
