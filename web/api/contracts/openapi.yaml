openapi: 3.0.3
info:
  title: DatqBox API
  description: API REST para DatqBox - Sistema Administrativo con Stored Procedures
  version: 1.0.0
  contact:
    name: DatqBox Team

servers:
  - url: http://localhost:3001/v1
    description: Development server
  - url: http://localhost:3001/api/v1
    description: Alternative path

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        message:
          type: string

    SpResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

    PaginatedResponse:
      type: object
      properties:
        rows:
          type: array
          items:
            type: object
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # Clientes
    Cliente:
      type: object
      properties:
        CODIGO:
          type: string
          example: "CLI001"
        NOMBRE:
          type: string
          example: "Juan Pérez"
        RIF:
          type: string
          example: "J-12345678-9"
        NIT:
          type: string
        DIRECCION:
          type: string
        TELEFONO:
          type: string
        EMAIL:
          type: string
        LIMITE:
          type: number
        CREDITO:
          type: number

    # Proveedores
    Proveedor:
      type: object
      properties:
        CODIGO:
          type: string
          example: "PROV001"
        NOMBRE:
          type: string
          example: "Proveedor ABC"
        RIF:
          type: string
        NIT:
          type: string
        DIRECCION:
          type: string
        TELEFONO:
          type: string
        FAX:
          type: string
        NOTAS:
          type: string

    # Inventario
    Inventario:
      type: object
      properties:
        CODIGO:
          type: string
          example: "ART001"
        DESCRIPCION:
          type: string
          example: "Producto de prueba"
        Referencia:
          type: string
        Categoria:
          type: string
        Marca:
          type: string
        EXISTENCIA:
          type: number
        PRECIO_COMPRA:
          type: number
        PRECIO_VENTA:
          type: number

    # Bancos
    Banco:
      type: object
      properties:
        Nombre:
          type: string
          example: "Banco Mercantil"
        Contacto:
          type: string
        Direccion:
          type: string
        Telefonos:
          type: string

    # Categorías
    Categoria:
      type: object
      properties:
        Codigo:
          type: integer
          example: 1
        Nombre:
          type: string
          example: "Electrónica"

    # Almacén
    Almacen:
      type: object
      properties:
        Codigo:
          type: string
          example: "ALM01"
        Descripcion:
          type: string
          example: "Almacén Principal"
        Tipo:
          type: string

    # Vendedores
    Vendedor:
      type: object
      properties:
        Codigo:
          type: string
          example: "V001"
        Nombre:
          type: string
        Email:
          type: string
        Comision:
          type: number
        Status:
          type: boolean

    # Empleados
    Empleado:
      type: object
      properties:
        CEDULA:
          type: string
          example: "V12345678"
        NOMBRE:
          type: string
        CARGO:
          type: string
        SUELDO:
          type: number
        STATUS:
          type: string
          example: "ACTIVO"

    # Cuentas
    Cuenta:
      type: object
      properties:
        COD_CUENTA:
          type: string
          example: "1.1.01"
        DESCRIPCION:
          type: string
        TIPO:
          type: string
        grupo:
          type: string

    # Centro de Costo
    CentroCosto:
      type: object
      properties:
        Codigo:
          type: string
          example: "CC001"
        Descripcion:
          type: string

security:
  - bearerAuth: []

paths:
  # ============================================
  # CLIENTES
  # ============================================
  /clientes:
    get:
      summary: Listar clientes
      tags: [Clientes]
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: estado
          in: query
          schema:
            type: string
        - name: vendedor
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        200:
          description: Lista de clientes
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                properties:
                  rows:
                    items:
                      $ref: '#/components/schemas/Cliente'
    post:
      summary: Crear cliente
      tags: [Clientes]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Cliente'
      responses:
        201:
          description: Cliente creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpResult'

  /clientes/{codigo}:
    get:
      summary: Obtener cliente por código
      tags: [Clientes]
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Cliente encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cliente'
        404:
          description: Cliente no encontrado
    put:
      summary: Actualizar cliente
      tags: [Clientes]
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Cliente'
      responses:
        200:
          description: Cliente actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpResult'
    delete:
      summary: Eliminar cliente
      tags: [Clientes]
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Cliente eliminado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpResult'

  # ============================================
  # PROVEEDORES
  # ============================================
  /proveedores:
