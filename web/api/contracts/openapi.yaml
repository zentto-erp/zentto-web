        200:
          description: Lista de asientos
    post:
      summary: Crear asiento contable
      tags: [Contabilidad]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fecha:
                  type: string
                  format: date
                tipoAsiento:
                  type: string
                  example: DIA
                referencia:
                  type: string
                concepto:
                  type: string
                moneda:
                  type: string
                  example: VES
                tasa:
                  type: number
                origenModulo:
                  type: string
