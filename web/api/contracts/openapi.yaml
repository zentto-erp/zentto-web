    put:
      summary: Actualizar vendedor
      tags: [Vendedores]
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Vendedor actualizado
    delete:
      summary: Eliminar vendedor
      tags: [Vendedores]
      parameters:
        - name: codigo
          in: path
