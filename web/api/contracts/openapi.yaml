    delete:
      summary: Eliminar centro de costo
      tags: [Centro de Costo]
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Centro de costo eliminado

  # ============================================
  # DOCUMENTOS VENTA (UNIFICADO)
  # ============================================
  /documentos-venta:
    get:
      summary: Listar documentos de venta (FACT, PRESUP, PEDIDO, COTIZ, NOTACRED, NOTADEB)
      tags: [Documentos Venta]
      parameters:
        - name: tipoOperacion
          in: query
          required: true
          schema:
            type: string
            enum: [FACT, PRESUP, PEDIDO, COTIZ, NOTACRED, NOTADEB, NOTA_ENT]
        - name: search
          in: query
          schema:
            type: string
        - name: codigo
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
      responses:
        200:
          description: Lista de documentos
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'

  /documentos-venta/{tipoOperacion}/{numFact}:
    get:
      summary: Obtener documento de venta por numero
      tags: [Documentos Venta]
      parameters:
        - name: tipoOperacion
          in: path
          required: true
          schema:
            type: string
        - name: numFact
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Documento encontrado
        404:
          description: Documento no encontrado

  /documentos-venta/{tipoOperacion}/{numFact}/detalle:
    get:
      summary: Obtener detalle de documento de venta
      tags: [Documentos Venta]
      parameters:
        - name: tipoOperacion
          in: path
          required: true
          schema:
            type: string
        - name: numFact
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Detalle del documento

  /documentos-venta/emitir-tx:
    post:
      summary: Emitir documento de venta transaccional
      tags: [Documentos Venta]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tipoOperacion:
                  type: string
                  enum: [FACT, PRESUP, PEDIDO, COTIZ, NOTACRED, NOTADEB]
                documento:
                  type: object
                detalle:
                  type: array
                  items:
                    type: object
                formasPago:
                  type: array
                  items:
                    type: object
                options:
                  type: object
      responses:
        201:
          description: Documento emitido
        400:
          description: Error de validacion

  /documentos-venta/anular-tx:
    post:
      summary: Anular documento de venta
      tags: [Documentos Venta]
      requestBody:
        required: true
        content:
