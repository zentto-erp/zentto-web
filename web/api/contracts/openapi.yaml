          description: Artículo encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Inventario'
    put:
      summary: Actualizar artículo
      tags: [Inventario]
      parameters:
        - name: codigo
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Inventario'
      responses:
        200:
          description: Artículo actualizado
    delete:
