  # ============================================
  # ALMACÉN
  # ============================================
  /almacen:
    get:
      summary: Listar almacenes
      tags: [Almacén]
      responses:
        200:
          description: Lista de almacenes
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/PaginatedResponse'
                properties:
                  rows:
                    items:
                      $ref: '#/components/schemas/Almacen'
    post:
      summary: Crear almacén
      tags: [Almacén]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Almacen'
      responses:
