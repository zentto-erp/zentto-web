          name: tipo
          schema:
            type: string
        - in: query
          name: nivel
          schema:
            type: integer
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          description: Plan de cuentas
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/GenericObject"
                  page:
                    type: integer
                  limit:
                    type: integer
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/contabilidad/cuentas/{codCuenta}:
    get:
      tags:
        - Contabilidad
      summary: Obtiene cuenta contable específica
      parameters:
        - in: path
          name: codCuenta
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/contabilidad/asientos:
    get:
      tags:
        - Contabilidad
      summary: Lista asientos contables
      parameters:
        - in: query
          name: fechaDesde
          schema:
            type: string
            format: date
        - in: query
          name: fechaHasta
          schema:
            type: string
            format: date
        - in: query
          name: tipoAsiento
          schema:
            type: string
        - in: query
          name: estado
          schema:
            type: string
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          $ref: "#/components/responses/OkPagedRows"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/contabilidad/asientos/{id}:
    get:
      tags:
        - Contabilidad
      summary: Obtiene asiento contable
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/contabilidad/asientos:
    post:
      tags:
        - Contabilidad
      summary: Crea asiento contable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fecha, tipoAsiento, concepto, detalle]
              properties:
                fecha:
                  type: string
                  format: date
                tipoAsiento:
                  type: string
                referencia:
                  type: string
                concepto:
                  type: string
                moneda:
                  type: string
                tasa:
                  type: number
                origenModulo:
                  type: string
                origenDocumento:
                  type: string
                detalle:
                  type: array
                  items:
                    type: object
                    properties:
                      codCuenta:
                        type: string
                      descripcion:
                        type: string
                      centroCosto:
                        type: string
                      auxiliarTipo:
                        type: string
                      auxiliarCodigo:
                        type: string
                      documento:
                        type: string
                      debe:
                        type: number
                      haber:
                        type: number
      responses:
        "201":
          $ref: "#/components/responses/CreatedObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/contabilidad/asientos/{id}/anular:
    post:
      tags:
        - Contabilidad
      summary: Anula asiento contable
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [motivo]
              properties:
                motivo:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/contabilidad/ajustes:
    post:
      tags:
        - Contabilidad
      summary: Crea ajuste contable
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fecha, tipoAjuste, motivo, detalle]
              properties:
                fecha:
                  type: string
                  format: date
                tipoAjuste:
                  type: string
                referencia:
                  type: string
                motivo:
                  type: string
                detalle:
                  type: array
                  items:
                    type: object
      responses:
        "201":
          $ref: "#/components/responses/CreatedObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/contabilidad/depreciaciones/generar:
    post:
      tags:
        - Contabilidad
      summary: Genera depreciación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [periodo]
              properties:
                periodo:
                  type: string
                  pattern: "^\\d{4}-\\d{2}$"
                  example: "2026-02"
                centroCosto:
                  type: string
      responses:
        "201":
          $ref: "#/components/responses/CreatedObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

