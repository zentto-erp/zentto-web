  /v1/cxc/aplicar-cobro-tx:
    post:
      tags:
        - CxC
      summary: Aplica cobro a cuentas por cobrar (transaccional)
      description: |
        Aplica un cobro a documentos pendientes de un cliente en una transaccion atomica.
        Incluye:
        - Insertar cabecera en Pagos
        - Insertar detalle en Pagos_Detalle (formas de pago)
        - Actualizar P_Cobrar (reduce pendiente/saldo)
        - Insertar historico en PagosC
        - Insertar Movimiento_Cuenta para control bancario
        - Recalcular saldos del cliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - requestId
                - codCliente
                - fecha
                - montoTotal
                - documentos
                - formasPago
                - codUsuario
              properties:
                requestId:
                  type: string
                  description: ID unico para idempotencia
                  example: req-cobro-001-20240214
                codCliente:
                  type: string
                  description: Codigo del cliente
                  example: CLI001
                fecha:
                  type: string
                  format: date
                  description: Fecha del cobro (YYYY-MM-DD)
                  example: 2026-02-14
                montoTotal:
                  type: number
                  description: Monto total del cobro
                  example: 1500
                documentos:
                  type: array
                  description: Documentos a los que se aplica el cobro
                  items:
                    type: object
                    required:
                      - tipoDoc
                      - numDoc
                      - montoAplicar
                    properties:
                      tipoDoc:
                        type: string
                        enum:
                          - FACT
                          - N/C
                          - N/D
                        example: FACT
                      numDoc:
                        type: string
                        example: F000123
                      montoAplicar:
                        type: number
                        example: 1000
                formasPago:
                  type: array
                  description: Formas de pago utilizadas
                  items:
                    type: object
                    required:
                      - formaPago
                      - monto
                    properties:
                      formaPago:
                        type: string
                        example: EFECTIVO
                      monto:
                        type: number
                        example: 500
                      banco:
                        type: string
                        example: Banco X
                      numCheque:
                        type: string
                        example: "123456"
                      fechaVencimiento:
                        type: string
                        format: date
                        example: 2026-02-14
                codUsuario:
                  type: string
                  description: Codigo del usuario que registra
                  example: SUP
                observaciones:
                  type: string
                  example: Cobro parcial factura
            example:
              requestId: req-cobro-001-20240214
              codCliente: CLI001
              fecha: 2026-02-14
              montoTotal: 1500
              documentos:
                - tipoDoc: FACT
                  numDoc: F000123
                  montoAplicar: 1000
                - tipoDoc: FACT
                  numDoc: F000124
                  montoAplicar: 500
              formasPago:
                - formaPago: EFECTIVO
                  monto: 500
                - formaPago: CHEQUE
                  monto: 1000
                  banco: Banco X
                  numCheque: "123456"
              codUsuario: SUP
              observaciones: Cobro parcial
      responses:
        "200":
          description: Cobro aplicado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      ok:
                        type: boolean
                        example: true
                      numRecibo:
                        type: string
                        example: RC260214153045
                      montoAplicado:
                        type: number
                        example: 1500
                      documentosAfectados:
                        type: integer
                        example: 2
        "400":
          description: Error de validacion
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid_payload
                  message:
                    type: string
                    example: La suma de formas de pago no coincide con el monto total
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          description: Error en la transaccion
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: transaction_failed
                  message:
                    type: string
                    example: "Documento no encontrado: FACT-F000123"
