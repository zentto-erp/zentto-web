      summary: Actualiza compra
      parameters:
        - $ref: "#/components/parameters/NumFactParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Compras
      summary: Elimina compra
      parameters:
        - $ref: "#/components/parameters/NumFactParam"
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/compras/{numFact}/detalle:
    get:
      tags:
        - Compras
      summary: Detalle compra
      parameters:
        - $ref: "#/components/parameters/NumFactParam"
      responses:
        "200":
          $ref: "#/components/responses/OkArray"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/facturas:
    get:
      tags:
        - Facturas
      summary: Lista facturas
      parameters:
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          $ref: "#/components/responses/OkPagedRowsPageSize"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/facturas/tx:
    post:
      tags:
        - Facturas
      summary: Crea factura mas detalle en transaccion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                factura:
                  $ref: "#/components/schemas/GenericObject"
                detalle:
                  type: array
                  items:
                    $ref: "#/components/schemas/GenericObject"
      responses:
        "201":
          $ref: "#/components/responses/TxCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/facturas/{numFact}:
    get:
      tags:
        - Facturas
      summary: Factura por numero
      parameters:
        - $ref: "#/components/parameters/NumFactParam"
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/facturas/{numFact}/detalle:
    get:
      tags:
        - Facturas
      summary: Detalle factura
      parameters:
        - $ref: "#/components/parameters/NumFactParam"
      responses:
        "200":
          $ref: "#/components/responses/OkArray"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/abonos:
    get:
      tags:
        - Abonos
      summary: Lista abonos
      parameters:
        - $ref: "#/components/parameters/SearchQuery"
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          $ref: "#/components/responses/OkPagedRows"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Abonos
      summary: Crea abono cabecera
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "201":
          $ref: "#/components/responses/CreatedObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
