  # ──────────────────────────────────────────────────────────────────────────
  # CMS — Blog + páginas institucionales (ADR-CMS-001)
  # Endpoints públicos en /v1/public/cms/* y administración en /v1/cms/*.
  # ──────────────────────────────────────────────────────────────────────────

  /v1/public/cms/posts:
    get:
      tags: [CMS]
      summary: Lista pública de posts publicados (paginada, filtrable)
      description: |
        Devuelve posts con Status='published'. Filtros por vertical, category y locale.
        Cache CDN 5 min (Cache-Control s-maxage=300).
      parameters:
        - in: query
          name: vertical
          schema: { type: string, example: hotel }
          description: corporate | hotel | medical | tickets | restaurante | education | inmobiliario | rental | pos
        - in: query
          name: category
          schema: { type: string, example: producto }
          description: producto | casos | tutoriales | noticias | changelog
        - in: query
          name: locale
          schema: { type: string, default: es }
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Lista de posts
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/CmsPostListItem" }
                  total:  { type: integer }
                  limit:  { type: integer }
                  offset: { type: integer }

  /v1/public/cms/posts/{slug}:
    get:
      tags: [CMS]
      summary: Detalle público de un post publicado
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
        - in: query
          name: locale
          schema: { type: string, default: es }
      responses:
        "200":
          description: Post encontrado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:   { type: boolean }
                  data: { $ref: "#/components/schemas/CmsPostDetail" }
        "404":
          description: Post no encontrado o no publicado

  /v1/public/cms/pages:
    get:
      tags: [CMS]
      summary: Lista pública de páginas institucionales publicadas
      parameters:
        - in: query
          name: vertical
          schema: { type: string, default: corporate }
        - in: query
          name: locale
          schema: { type: string, default: es }
      responses:
        "200":
          description: Lista de páginas

  /v1/public/cms/pages/{slug}:
    get:
      tags: [CMS]
      summary: Detalle público de página institucional (acerca, prensa, recursos)
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
        - in: query
          name: vertical
          schema: { type: string, default: corporate }
        - in: query
          name: locale
          schema: { type: string, default: es }
      responses:
        "200":
          description: Página encontrada
        "404":
          description: Página no encontrada o no publicada

  /v1/cms/posts:
    get:
      tags: [CMS]
      summary: Admin — lista posts incluyendo drafts (requiere JWT + cms_editor)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: vertical
          schema: { type: string }
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: locale
          schema: { type: string, default: es }
        - in: query
          name: status
          schema: { type: string, enum: [draft, published, archived] }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        "200":
          description: Lista admin de posts
    post:
      tags: [CMS]
      summary: Admin — crea un post (draft por defecto)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CmsPostUpsertInput" }
      responses:
        "201":
          description: Post creado

  /v1/cms/posts/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    put:
      tags: [CMS]
      summary: Admin — actualiza post existente
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CmsPostUpsertInput" }
      responses:
        "200":
          description: Post actualizado
    delete:
      tags: [CMS]
      summary: Admin — elimina post
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Post eliminado

  /v1/cms/posts/{id}/publish:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    post:
      tags: [CMS]
      summary: Admin — publica un post
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Post publicado

  /v1/cms/posts/{id}/unpublish:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    post:
      tags: [CMS]
      summary: Admin — despublica un post (pasa a draft)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Post despublicado

  /v1/cms/pages:
    get:
      tags: [CMS]
      summary: Admin — lista páginas institucionales
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Lista admin de páginas
    post:
      tags: [CMS]
      summary: Admin — crea página institucional
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CmsPageUpsertInput" }
      responses:
        "201":
          description: Página creada

  /v1/cms/pages/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    put:
      tags: [CMS]
      summary: Admin — actualiza página
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CmsPageUpsertInput" }
      responses:
        "200":
          description: Página actualizada
    delete:
      tags: [CMS]
      summary: Admin — elimina página
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Página eliminada

  /v1/cms/pages/{id}/publish:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    post:
      tags: [CMS]
      summary: Admin — publica una página
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Página publicada
