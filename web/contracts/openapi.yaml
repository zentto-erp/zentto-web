        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          $ref: "#/components/responses/OkPagedRows"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Compras
      summary: Crea compra cabecera
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "201":
          $ref: "#/components/responses/CreatedObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/compras/tx:
    post:
      tags:
        - Compras
      summary: Crea compra mas detalle en transaccion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                compra:
                  $ref: "#/components/schemas/GenericObject"
                detalle:
                  type: array
                  items:
                    $ref: "#/components/schemas/GenericObject"
      responses:
        "201":
          $ref: "#/components/responses/TxCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/compras/{numFact}:
