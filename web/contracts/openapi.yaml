openapi: 3.0.3
info:
  title: DatqBox API
  version: 1.7.0
  description: |
    API REST de DatqBox ERP - Sistema de Gestión Empresarial
    
    **Módulos disponibles:**
    - Auth (Autenticación JWT, RBAC, Cambio/Reset de contraseña)
    - Clientes, Proveedores, Vendedores, Empleados
    - Inventario, Artículos, Categorías, Marcas, Líneas
    - Documentos de Venta (FACT, PED, COT, etc.)
    - Documentos de Compra (ORDEN, COMPRA)
    - CxC / CxP (Cuentas por Cobrar/Pagar)
    - Abonos, Pagos, Cuentas por Pagar
    - **Bancos** (Conciliación bancaria)
    - **Nómina** (Conceptos legales, LOT, procesamiento)
    - **Contabilidad** (Plan de cuentas, asientos, reportes)
    - Retenciones, Movimientos de Inventario
    - Meta, CRUD, Addons
servers:
  - url: http://localhost:3001
    description: Servidor de desarrollo local
  - url: http://localhost:4000
    description: Puerto alternativo (legacy)
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required:
        - usuario
        - clave
      properties:
        usuario:
          type: string
          example: SUP
        clave:
          type: string
          example: SUP
    LoginResponse:
      type: object
      properties:
        token:
          type: string
        userId:
          type: string
        userName:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        isAdmin:
          type: boolean
        permisos:
          $ref: "#/components/schemas/PermisosObject"
        modulos:
          type: array
          items:
            type: string
          description: Módulos permitidos para este usuario
        usuario:
          type: object
          properties:
            codUsuario:
              type: string
            nombre:
              type: string
              nullable: true
            tipo:
              type: string
              nullable: true
            isAdmin:
              type: boolean
    PermisosObject:
      type: object
      description: Permisos del usuario basados en campos de tabla Usuarios
      properties:
        canUpdate:
          type: boolean
          description: Campo Updates
        canCreate:
          type: boolean
          description: Campo Addnews
        canDelete:
          type: boolean
          description: Campo Deletes
        canChangePrice:
          type: boolean
          description: Campo PrecioMinimo
        canGiveCredit:
          type: boolean
          description: Campo Credito
        canChangePwd:
          type: boolean
          description: Campo Cambiar
        isCreator:
          type: boolean
          description: Campo Creador
    GenericObject:
      type: object
      additionalProperties: true
    TxPayload:
      type: object
      properties:
        header:
          $ref: "#/components/schemas/GenericObject"
        detalle:
          type: array
          items:
            $ref: "#/components/schemas/GenericObject"
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        issues:
          type: object
          additionalProperties: true
      required:
        - error
    PagedRowsResponse:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 50
        total:
          type: integer
          example: 1234
        rows:
          type: array
          items:
            $ref: "#/components/schemas/GenericObject"
      required:
        - rows
    PagedRowsPageSizeResponse:
      type: object
      properties:
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 50
        rows:
          type: array
          items:
            $ref: "#/components/schemas/GenericObject"
      required:
        - rows
    RowsArrayResponse:
      type: array
      items:
        $ref: "#/components/schemas/GenericObject"
    MutationResponse:
      type: object
      additionalProperties: true
      example:
        ok: true
    TxResultResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        numFact:
          type: string
          example: "000123"
        detalleRows:
          type: integer
          example: 3
      required:
        - ok
    AddonsListResponse:
      type: object
      properties:
        addons:
          type: array
          items:
            $ref: "#/components/schemas/GenericObject"
      required:
        - addons
    CrudKeyResponse:
      type: object
      properties:
        key:
          type: string
          example: eyJDT0RJR08iOiJDMDAxIn0
      required:
        - key
    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
      required:
        - ok
  parameters:
    IdParam:
      in: path
      name: id
      required: true
      schema:
        type: string
    CodigoParam:
      in: path
      name: codigo
      required: true
      schema:
        type: string
    NumFactParam:
      in: path
      name: numFact
      required: true
      schema:
        type: string
    TableParam:
      in: path
      name: table
      required: true
      schema:
        type: string
    KeyParam:
      in: path
      name: key
      required: true
      schema:
        type: string
        description: base64url json key
    SchemaQuery:
      in: query
      name: schema
      required: false
      schema:
        type: string
        default: dbo
    SearchQuery:
      in: query
      name: search
      required: false
      schema:
        type: string
    PageQuery:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitQuery:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 50
  responses:
    Unauthorized:
      description: Token requerido o invalido
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Solicitud invalida
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Registro no encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    OkObject:
      description: OK
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GenericObject"
    OkArray:
      description: OK
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RowsArrayResponse"
    OkPagedRows:
      description: Lista paginada
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PagedRowsResponse"
    OkPagedRowsPageSize:
      description: Lista paginada
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PagedRowsPageSizeResponse"
    CreatedObject:
      description: Creado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MutationResponse"
    TxCreated:
      description: Transacci?n completada
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/TxResultResponse"
    OkAddons:
      description: Add-ons activos
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AddonsListResponse"
    OkCrudKey:
      description: Key codificada
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CrudKeyResponse"
    HealthOk:
      description: Servicio activo
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/HealthResponse"
paths:
  /v1/auth/login:
    post:
      tags:
        - Auth
      summary: Login contra tabla Usuarios
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login correcto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/me:
    get:
      tags:
        - Auth
      summary: Datos del usuario autenticado (desde JWT)
      responses:
        "200":
          description: Perfil del usuario autenticado
          content:
            application/json:
              schema:
                type: object
                properties:
                  codUsuario:
                    type: string
                  nombre:
                    type: string
                  tipo:
                    type: string
                  isAdmin:
                    type: boolean
                  permisos:
                    $ref: "#/components/schemas/PermisosObject"
                  modulos:
                    type: array
                    items:
                      type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/change-password:
    post:
      tags:
        - Auth
      summary: Cambio de contraseña del usuario autenticado
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  description: Contraseña actual
                newPassword:
                  type: string
                  description: "Nueva contraseña (min 6 chars, 1 mayúscula, 1 número)"
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/reset-password:
    post:
      tags:
        - Auth
      summary: "Reset de contraseña por administrador (admin only)"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [codUsuario, newPassword]
              properties:
                codUsuario:
                  type: string
                newPassword:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Solo administradores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /v1/clientes:
    get:
      tags:
        - Clientes
      summary: Lista clientes
      parameters:
        - $ref: "#/components/parameters/SearchQuery"
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          $ref: "#/components/responses/OkPagedRows"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Clientes
      summary: Crea cliente
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "201":
          $ref: "#/components/responses/CreatedObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/clientes/{codigo}:
    get:
      tags:
        - Clientes
      summary: Cliente por codigo
      parameters:
        - $ref: "#/components/parameters/CodigoParam"
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags:
        - Clientes
      summary: Actualiza cliente
      parameters:
        - $ref: "#/components/parameters/CodigoParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Clientes
      summary: Elimina cliente
      parameters:
        - $ref: "#/components/parameters/CodigoParam"
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/proveedores:
    get:
      tags:
        - Proveedores
      summary: Lista proveedores
      parameters:
        - $ref: "#/components/parameters/SearchQuery"
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          $ref: "#/components/responses/OkPagedRows"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Proveedores
      summary: Crea proveedor
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "201":
          $ref: "#/components/responses/CreatedObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/proveedores/{codigo}:
    get:
      tags:
        - Proveedores
      summary: Proveedor por codigo
      parameters:
        - $ref: "#/components/parameters/CodigoParam"
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags:
        - Proveedores
      summary: Actualiza proveedor
      parameters:
        - $ref: "#/components/parameters/CodigoParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Proveedores
      summary: Elimina proveedor
      parameters:
        - $ref: "#/components/parameters/CodigoParam"
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/inventario:
    get:
      tags:
        - Inventario
      summary: Lista inventario
      parameters:
        - $ref: "#/components/parameters/SearchQuery"
        - $ref: "#/components/parameters/PageQuery"
        - $ref: "#/components/parameters/LimitQuery"
      responses:
        "200":
          $ref: "#/components/responses/OkPagedRows"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags:
        - Inventario
      summary: Crea item inventario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "201":
          $ref: "#/components/responses/CreatedObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/inventario/{codigo}:
    get:
      tags:
        - Inventario
      summary: Inventario por codigo
      parameters:
        - $ref: "#/components/parameters/CodigoParam"
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags:
        - Inventario
      summary: Actualiza item inventario
      parameters:
        - $ref: "#/components/parameters/CodigoParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericObject"
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags:
        - Inventario
      summary: Elimina item inventario
      parameters:
        - $ref: "#/components/parameters/CodigoParam"
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
  /v1/articulos:
    get:
      tags:
        - Inventario
      summary: Alias de inventario para articulos
      responses:
        "200":
          $ref: "#/components/responses/OkPagedRows"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /v1/articulos/{codigo}:
