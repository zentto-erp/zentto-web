              properties:
                compra:
                  $ref: "#/components/schemas/GenericObject"
                detalle:
                  type: array
                  minItems: 1
                  items:
                    $ref: "#/components/schemas/GenericObject"
                options:
                  type: object
                  properties:
                    actualizarInventario:
                      type: boolean
                      default: true
                    generarCxP:
                      type: boolean
                      default: true
                    actualizarSaldosProveedor:
                      type: boolean
                      default: true
                    cxpTable:
                      type: string
                      enum:
                        - P_Pagar
