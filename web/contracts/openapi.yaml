  #  CRM — Companies / Contacts / Deals (ADR-CRM-001)
  # ═══════════════════════════════════════════════════════════════════════════
  /v1/crm/search:
    get:
      tags: [CRM]
      summary: Busqueda cross-entity CRM (CommandPalette)
      description: >
        Busqueda unificada a traves de contactos, empresas y deals.
        Reusa los SPs usp_crm_Contact_Search / usp_crm_Company_Search /
        usp_crm_Deal_Search. Tenant se resuelve via JWT (getActiveScope).
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string, minLength: 2, maxLength: 200 }
          description: Termino de busqueda (minimo 2 caracteres)
        - in: query
          name: entities
          required: false
          schema:
            type: string
            default: "contact,company,deal"
          description: >
            CSV de entidades a consultar. Valores permitidos:
            `lead`, `contact`, `company`, `deal`. Default: `contact,company,deal`.
            La entidad `lead` no esta implementada aun; si se incluye se devuelve
            en `warnings` (ver response).
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 10 }
          description: Resultados maximos por entidad
      responses:
        "200":
          description: Resultados combinados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CrmSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/crm/companies:
    get:
      tags: [CRM]
      summary: Listar empresas CRM
      parameters:
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: industry
          schema: { type: string }
        - in: query
          name: active
          schema: { type: boolean }
        - in: query
          name: page
          schema: { type: integer, minimum: 1 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500 }
      responses:
        "200":
          description: Lista paginada
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [CRM]
      summary: Crear empresa CRM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:      { type: string, maxLength: 200 }
                legalName: { type: string }
                taxId:     { type: string }
                industry:  { type: string }
                size:      { type: string, enum: ["1-10","11-50","51-200","201-500","501-1000","1000+"] }
                website:   { type: string }
                phone:     { type: string }
                email:     { type: string, format: email }
                notes:     { type: string }
                isActive:  { type: boolean }
      responses:
        "200":
          description: Creada
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/crm/companies/search:
    get:
      tags: [CRM]
      summary: Busqueda rapida de empresas CRM
      parameters:
        - in: query
          name: q
          required: true
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer }
      responses:
        "200":
          description: Resultados

  /v1/crm/companies/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: integer }
    get:
      tags: [CRM]
      summary: Detalle de empresa CRM
      responses:
        "200":
          description: Empresa
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [CRM]
      summary: Actualizar empresa CRM
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:      { type: string }
                legalName: { type: string }
                taxId:     { type: string }
                industry:  { type: string }
                size:      { type: string }
                website:   { type: string }
                phone:     { type: string }
                email:     { type: string }
                notes:     { type: string }
                isActive:  { type: boolean }
      responses:
        "200":
          description: Actualizada
    delete:
      tags: [CRM]
      summary: Borrar (soft) empresa CRM
      responses:
        "200":
          description: Borrada

