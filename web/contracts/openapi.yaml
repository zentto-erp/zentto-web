    post:
      tags:
        - Presupuestos
      summary: Emite presupuesto con logica de negocio (formas de pago, CxC, inventario, MovInvent)
      description: Misma estructura que facturas/emitir-tx; tablas Presupuestos y Detalle_Presupuestos.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - detalle
              properties:
                presupuesto:
                  $ref: "#/components/schemas/GenericObject"
                factura:
                  $ref: "#/components/schemas/GenericObject"
                detalle:
                  type: array
                  minItems: 1
                  items:
                    $ref: "#/components/schemas/GenericObject"
                formasPago:
                  type: array
                  items:
                    $ref: "#/components/schemas/GenericObject"
                options:
                  type: object
                  properties:
                    actualizarInventario:
                      type: boolean
                      default: true
                    generarCxC:
                      type: boolean
                      default: true
                    cxcTable:
                      type: string
                      enum:
                        - P_Cobrar
                        - P_CobrarC
                      default: P_Cobrar
                    formaPagoTable:
                      type: string
                      example: Detalle_FormaPagoCotizacion
                    actualizarSaldosCliente:
                      type: boolean
                      default: true
      responses:
        "201":
          $ref: "#/components/responses/TxCreated"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
