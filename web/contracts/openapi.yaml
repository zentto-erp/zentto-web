openapi: 3.0.3
info:
  title: Zentto ERP API
  version: 2.0.0
  description: |
    API REST de Zentto ERP - Sistema de Gestion Empresarial

    **Modulos principales:**
    - Auth (JWT, RBAC, Permisos granulares)
    - Ventas (Facturas, Pedidos, Cotizaciones, Notas credito/debito)
    - Compras (Ordenes, Recepcion de mercancia, Devoluciones)
    - CxC / CxP (Cuentas por Cobrar/Pagar, Cobros, Pagos)
    - Inventario Avanzado (Seriales, Lotes, Bins, FIFO/LIFO, Valoracion)
    - Logistica (Transportistas, Notas de entrega, Guias de despacho)
    - Bancos (Conciliacion bancaria, Caja Chica, Movimientos)
    - Contabilidad (Asientos, Plan de cuentas, Activos fijos, Fiscal)
    - Nomina (Procesamiento, Vacaciones, Liquidaciones, Batch)
    - RRHH (Utilidades, Fideicomiso, Caja de Ahorro, Salud Ocupacional)
    - CRM (Pipeline, Leads, Actividades, Call Center, Campanas)
    - Manufactura (BOM, Ordenes de produccion, Centros de trabajo)
    - Flota (Vehiculos, Combustible, Mantenimiento, Viajes)
    - POS (Facturacion tactil, Impresora fiscal, Cierre de caja)
    - Restaurante (Mesas, Cocina, Recetas)
    - E-Commerce (Tienda online, Carrito, Checkout)
    - Auditoria (Trail automatico, Alertas, Reportes)
    - Permisos (RBAC granular, Aprobaciones, Restricciones de precio)
    - Payments (Pasarelas de pago, Transacciones)
    - Config, Settings, Media, Supervision, Fiscal
  contact:
    name: Zentto ERP
    url: https://zentto.net
    email: info@zentto.net
servers:
  - url: https://api.zentto.net
    description: Produccion
  - url: http://localhost:4000
    description: Desarrollo local
  - url: http://localhost:4000
    description: Puerto alternativo (legacy)
security:
  - bearerAuth: []
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    LoginRequest:
      type: object
      required:
        - usuario
        - clave
      properties:
        usuario:
          type: string
          example: SUP
        clave:
          type: string
          example: SUP
        companyId:
          type: integer
          nullable: true
        branchId:
          type: integer
          nullable: true
        captchaToken:
          type: string
          nullable: true
    LoginResponse:
      type: object
      properties:
        token:
          type: string
        userId:
          type: string
        userName:
          type: string
          nullable: true
        email:
          type: string
          nullable: true
        isAdmin:
          type: boolean
        permisos:
          $ref: "#/components/schemas/PermisosObject"
        modulos:
          type: array
          items:
            type: string
          description: Módulos permitidos para este usuario
        usuario:
          type: object
          properties:
            codUsuario:
              type: string
            nombre:
              type: string
              nullable: true
            tipo:
              type: string
              nullable: true
            isAdmin:
              type: boolean
    PermisosObject:
      type: object
      description: Permisos del usuario basados en campos de tabla Usuarios
      properties:
        canUpdate:
          type: boolean
          description: Campo Updates
        canCreate:
          type: boolean
          description: Campo Addnews
        canDelete:
          type: boolean
          description: Campo Deletes
        canChangePrice:
          type: boolean
          description: Campo PrecioMinimo
        canGiveCredit:
          type: boolean
          description: Campo Credito
        canChangePwd:
          type: boolean
          description: Campo Cambiar
        isCreator:
          type: boolean
          description: Campo Creador
    GenericObject:
      type: object
      additionalProperties: true
    TxPayload:
      type: object
      properties:
        header:
          $ref: "#/components/schemas/GenericObject"
        detalle:
          type: array
          items:
            $ref: "#/components/schemas/GenericObject"
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        issues:
          type: object
          additionalProperties: true
      required:
        - error
    PagedRowsResponse:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 50
        total:
          type: integer
          example: 1234
        rows:
          type: array
          items:
            $ref: "#/components/schemas/GenericObject"
      required:
        - rows
    PagedRowsPageSizeResponse:
      type: object
      properties:
        page:
          type: integer
          example: 1
        pageSize:
          type: integer
          example: 50
        rows:
          type: array
          items:
            $ref: "#/components/schemas/GenericObject"
      required:
        - rows
    RowsArrayResponse:
      type: array
      items:
        $ref: "#/components/schemas/GenericObject"
    MutationResponse:
      type: object
      additionalProperties: true
      example:
        ok: true
    TxResultResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
        numFact:
          type: string
          example: "000123"
        detalleRows:
          type: integer
          example: 3
      required:
        - ok
    AddonsListResponse:
      type: object
      properties:
        addons:
          type: array
          items:
            $ref: "#/components/schemas/GenericObject"
      required:
        - addons
    CrudKeyResponse:
      type: object
      properties:
        key:
          type: string
          example: eyJDT0RJR08iOiJDMDAxIn0
      required:
        - key
    HealthResponse:
      type: object
      properties:
        ok:
          type: boolean
          example: true
      required:
        - ok
    Employee:
      type: object
      description: Empleado del sistema (normalizado multi-DB)
      properties:
        CEDULA:
          type: string
        NOMBRE:
          type: string
        GRUPO:
          type: string
          nullable: true
        CARGO:
          type: string
          nullable: true
          description: PositionName
        NOMINA:
          type: string
          nullable: true
          description: DepartmentName
        SUELDO:
          type: number
          nullable: true
          description: Salary
        STATUS:
          type: string
          nullable: true
        SEXO:
          type: string
          nullable: true
        NACIONALIDAD:
          type: string
          nullable: true
        DIRECCION:
          type: string
          nullable: true
        TELEFONO:
          type: string
          nullable: true
        Autoriza:
          type: boolean
          nullable: true
    EmployeeInput:
      type: object
      description: Input para crear o actualizar empleado
      required:
        - CEDULA
        - NOMBRE
      properties:
        CEDULA:
          type: string
        NOMBRE:
          type: string
        GRUPO:
          type: string
        CARGO:
          type: string
        NOMINA:
          type: string
        SUELDO:
          type: number
        STATUS:
          type: string
          default: ACTIVO
        SEXO:
          type: string
        NACIONALIDAD:
          type: string
        DIRECCION:
          type: string
        TELEFONO:
          type: string
        Autoriza:
          type: boolean
    Company:
      type: object
      description: Datos de la empresa
      properties:
        Empresa:
          type: string
        RIF:
          type: string
          nullable: true
        Nit:
          type: string
          nullable: true
        Telefono:
          type: string
          nullable: true
        Direccion:
          type: string
          nullable: true
          description: Address
        LegalRep:
          type: string
          nullable: true
          description: Representante legal
    CompanyInput:
      type: object
      description: Input para actualizar empresa
      properties:
        Empresa:
          type: string
        RIF:
          type: string
        Nit:
          type: string
        Telefono:
          type: string
        Direccion:
          type: string
    AuditLog:
      type: object
      description: Registro de auditoría
      properties:
        AuditLogId:
          type: integer
        ModuleName:
          type: string
        EntityName:
          type: string
        ActionType:
          type: string
        UserCode:
          type: string
        CreatedAt:
          type: string
          format: date-time
        Details:
          type: object
          additionalProperties: true
          nullable: true
    PaymentMethod:
      type: object
      description: Método de pago
      properties:
        MethodId:
          type: integer
        MethodCode:
          type: string
        MethodName:
          type: string
        IsActive:
          type: boolean
    Country:
      type: object
      description: País con configuración fiscal y monetaria
      properties:
        CountryCode:
          type: string
          example: VE
        CountryName:
          type: string
        CurrencyCode:
          type: string
        TaxAuthorityCode:
          type: string
          nullable: true
        FiscalIdName:
          type: string
          nullable: true
        IsActive:
          type: boolean
    State:
      type: object
      description: Estado/provincia de un país
      properties:
        StateId:
          type: integer
        CountryCode:
          type: string
          example: VE
        StateCode:
          type: string
          example: VE-DC
        StateName:
          type: string
          example: Distrito Capital
        SortOrder:
          type: integer
    Lookup:
      type: object
      description: Valor de catálogo de referencia
      properties:
        LookupId:
          type: integer
        Code:
          type: string
          example: SEMANAL
        Label:
          type: string
          example: Semanal
        LabelEn:
          type: string
          nullable: true
        SortOrder:
          type: integer
        Extra:
          type: string
          nullable: true
    MediaAsset:
      type: object
      description: Archivo multimedia almacenado
      properties:
        AssetId:
          type: integer
        StorageKey:
          type: string
        FileName:
          type: string
        MimeType:
          type: string
        FileSizeMb:
          type: number
        PublicUrl:
          type: string
    VacationRequest:
      type: object
      description: Solicitud de vacaciones
      properties:
        RequestId:
          type: string
        EmployeeCode:
          type: string
        EmployeeName:
          type: string
          nullable: true
        StartDate:
          type: string
          format: date
        EndDate:
          type: string
          format: date
        DaysRequested:
          type: integer
        Status:
          type: string
          enum: [PENDIENTE, APROBADA, RECHAZADA, CANCELADA]
        CreatedAt:
          type: string
          format: date-time
    PayrollBatch:
      type: object
      description: Lote de nómina (pre-nómina procesable)
      properties:
        BatchId:
          type: integer
        PayrollCode:
          type: string
        FromDate:
          type: string
          format: date
        ToDate:
          type: string
          format: date
        Status:
          type: string
          enum: [DRAFT, APPROVED, PROCESSED, CLOSED]
        TotalGross:
          type: number
          nullable: true
        TotalDeductions:
          type: number
          nullable: true
        TotalNet:
          type: number
          nullable: true
    CrmSavedView:
      type: object
      description: Vista guardada (filtros + columnas + orden) por usuario y entidad CRM.
      properties:
        ViewId:
          type: integer
          format: int64
        CompanyId:
          type: integer
        UserId:
          type: integer
        Entity:
          type: string
          enum: [LEAD, CONTACT, COMPANY, DEAL, ACTIVITY]
        Name:
          type: string
        FilterJson:
          type: object
          nullable: true
          additionalProperties: true
        ColumnsJson:
          nullable: true
          oneOf:
            - type: array
              items: {}
            - type: object
              additionalProperties: true
        SortJson:
          nullable: true
          oneOf:
            - type: array
              items: {}
            - type: object
              additionalProperties: true
        IsShared:
          type: boolean
        IsDefault:
          type: boolean
        IsOwner:
          type: boolean
        CreatedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time
    CrmSavedViewCreate:
      type: object
      required: [entity, name]
      properties:
        entity:
          type: string
          enum: [LEAD, CONTACT, COMPANY, DEAL, ACTIVITY]
        name:
          type: string
          maxLength: 200
        filterJson:
          type: object
          additionalProperties: true
        columnsJson:
          nullable: true
          oneOf:
            - type: array
              items: {}
            - type: object
              additionalProperties: true
        sortJson:
          nullable: true
          oneOf:
            - type: array
              items: {}
            - type: object
              additionalProperties: true
        isShared:
          type: boolean
          default: false
        isDefault:
          type: boolean
          default: false
    CrmSavedViewUpdate:
      type: object
      description: Todos los campos son opcionales. Solo el owner puede actualizar.
      properties:
        name:
          type: string
          maxLength: 200
        filterJson:
          type: object
          additionalProperties: true
        columnsJson:
          nullable: true
          oneOf:
            - type: array
              items: {}
            - type: object
              additionalProperties: true
        sortJson:
          nullable: true
          oneOf:
            - type: array
              items: {}
            - type: object
              additionalProperties: true
        isShared:
          type: boolean
        isDefault:
          type: boolean
    CrmSavedViewMutationResult:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        viewId:
          type: integer
          format: int64
          nullable: true
    CrmSearchResult:
      type: object
      required: [type, id, title]
      properties:
        type:
          type: string
          enum: [lead, contact, company, deal]
        id:
          oneOf:
            - type: integer
            - type: string
        title:
          type: string
          description: Nombre principal (contact name, company name, deal name)
        subtitle:
          type: string
          description: Info secundaria (email, phone, monto formateado, etc.)
        meta:
          type: object
          additionalProperties: true
          description: Campos extra utiles para el render del CommandPalette
    CrmSearchResponse:
      type: object
      required: [results, total, byEntity]
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/CrmSearchResult"
        total:
          type: integer
          description: Numero total de resultados (suma de todas las entidades)
        byEntity:
          type: object
          description: Conteo de resultados por entidad consultada
          properties:
            lead:    { type: integer }
            contact: { type: integer }
            company: { type: integer }
            deal:    { type: integer }
        warnings:
          type: array
          items: { type: string }
          description: Flags informativos (ej. `lead_search_not_implemented`)

    # ─── CMS (ADR-CMS-001) ────────────────────────────────────────────────
    CmsPostListItem:
      type: object
      properties:
        PostId:        { type: integer }
        CompanyId:     { type: integer }
        Slug:          { type: string }
        Vertical:      { type: string }
        Category:      { type: string }
        Locale:        { type: string }
        Title:         { type: string }
        Excerpt:       { type: string }
        CoverUrl:      { type: string }
        AuthorName:    { type: string }
        AuthorSlug:    { type: string }
        AuthorAvatar:  { type: string }
        Tags:          { type: string }
        ReadingMin:    { type: integer }
        Status:        { type: string, enum: [draft, published, archived] }
        PublishedAt:   { type: string, format: date-time, nullable: true }

    CmsPostDetail:
      allOf:
        - $ref: "#/components/schemas/CmsPostListItem"
        - type: object
          properties:
            Body:           { type: string, description: "Markdown" }
            SeoTitle:       { type: string }
            SeoDescription: { type: string }
            SeoImageUrl:    { type: string }
            CreatedAt:      { type: string, format: date-time }
            UpdatedAt:      { type: string, format: date-time }

    CmsPostUpsertInput:
      type: object
      required: [slug, vertical, category, title]
      properties:
        postId:         { type: integer, description: "Omitir para crear" }
        slug:           { type: string, maxLength: 200 }
        vertical:       { type: string, example: hotel }
        category:       { type: string, example: producto }
        locale:         { type: string, default: es }
        title:          { type: string, maxLength: 300 }
        excerpt:        { type: string, maxLength: 500 }
        body:           { type: string, description: "Markdown" }
        coverUrl:       { type: string, maxLength: 500 }
        authorName:     { type: string }
        authorSlug:     { type: string }
        authorAvatar:   { type: string }
        tags:           { type: string, description: "CSV simple" }
        readingMin:     { type: integer, default: 5 }
        seoTitle:       { type: string }
        seoDescription: { type: string }
        seoImageUrl:    { type: string }

    CmsPageUpsertInput:
      type: object
      required: [slug, title]
      properties:
        pageId:         { type: integer, description: "Omitir para crear" }
        slug:           { type: string, maxLength: 100, example: acerca }
        vertical:       { type: string, default: corporate }
        locale:         { type: string, default: es }
        title:          { type: string, maxLength: 300 }
        body:           { type: string }
        meta:           { type: object, additionalProperties: true }
        seoTitle:       { type: string }
        seoDescription: { type: string }

  parameters:
    IdParam:
      in: path
      name: id
      required: true
      schema:
        type: string
    CodigoParam:
      in: path
      name: codigo
      required: true
      schema:
        type: string
    NumFactParam:
      in: path
      name: numFact
      required: true
      schema:
        type: string
    TableParam:
      in: path
      name: table
      required: true
      schema:
        type: string
    KeyParam:
      in: path
      name: key
      required: true
      schema:
        type: string
        description: base64url json key
    SchemaQuery:
      in: query
      name: schema
      required: false
      schema:
        type: string
        default: dbo
    SearchQuery:
      in: query
      name: search
      required: false
      schema:
        type: string
    PageQuery:
      in: query
      name: page
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    LimitQuery:
      in: query
      name: limit
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 500
        default: 50
  responses:
    Unauthorized:
      description: Token requerido o invalido
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Solicitud invalida
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Registro no encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    OkObject:
      description: OK
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GenericObject"
    OkArray:
      description: OK
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/RowsArrayResponse"
    OkPagedRows:
      description: Lista paginada
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PagedRowsResponse"
    OkPagedRowsPageSize:
      description: Lista paginada
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/PagedRowsPageSizeResponse"
    CreatedObject:
      description: Creado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/MutationResponse"
    TxCreated:
      description: Transacci?n completada
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/TxResultResponse"
    OkAddons:
      description: Add-ons activos
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/AddonsListResponse"
    OkCrudKey:
      description: Key codificada
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/CrudKeyResponse"
    HealthOk:
      description: Servicio activo
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/HealthResponse"
paths:
  /v1/auth/login:
    post:
      tags:
        - Auth
      summary: Login contra tabla Usuarios
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login correcto
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /v1/auth/register:
    post:
      tags:
        - Auth
      summary: Registro de usuario con verificacion por correo
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [usuario, nombre, email, password]
              properties:
                usuario:
                  type: string
                nombre:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                captchaToken:
                  type: string
      responses:
        "201":
          $ref: "#/components/responses/CreatedObject"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/auth/verify-email:
    get:
      tags:
        - Auth
      summary: Confirma correo con token
      security: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "400":
          $ref: "#/components/responses/BadRequest"
    post:
      tags:
        - Auth
      summary: Confirma correo con token (POST)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                captchaToken:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/auth/resend-verification:
    post:
      tags:
        - Auth
      summary: Reenvia correo de verificacion
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identifier]
              properties:
                identifier:
                  type: string
                captchaToken:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/auth/forgot-password:
    post:
      tags:
        - Auth
      summary: Solicita recuperacion de contrasena
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [identifier]
              properties:
                identifier:
                  type: string
                captchaToken:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/auth/reset-password/confirm:
    post:
      tags:
        - Auth
      summary: Restablece contrasena con token de recuperacion
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, newPassword]
              properties:
                token:
                  type: string
                newPassword:
                  type: string
                captchaToken:
                  type: string
      responses:
        "200":
          $ref: "#/components/responses/OkObject"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/auth/me:
    get:
      tags:
        - Auth
      summary: Datos del usuario autenticado (desde JWT)
      responses:
        "200":
          description: Perfil del usuario autenticado
          content:
            application/json:
              schema:
                type: object
                properties:
                  codUsuario:
                    type: string
                  nombre:
                    type: string
                  tipo:
                    type: string
                  isAdmin:
                    type: boolean
                  permisos:
