version: '3.9'

# ── Zentto — docker-compose LOCAL (dev/staging) ───────────────────────────────
# Uso: docker compose up --build
# Para producción usa: docker-compose.prod.yml

services:
  # ── API Node/Express ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: zentto-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    env_file:
      - web/api/.env
    volumes:
      - api_storage:/app/storage/media
    networks:
      - zentto-net

  # ── Frontend (11 micro-apps via PM2) ────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: zentto-frontend
    restart: unless-stopped
    ports:
      - "3000-3010:3000-3010"
    environment:
      - NODE_ENV=production
    networks:
      - zentto-net

  # ── Nginx reverse proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: zentto-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/zentto.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - zentto-net

volumes:
  api_storage:

networks:
  zentto-net:
    driver: bridge
