# ─────────────────────────────────────────────────────────────────────
#  Deploy Frontend → DEV environment (appdev.zentto.net)
#
#  Trigger: push to developer branch (web/modular-frontend/**)
#  Target: Same Hetzner server, separate containers + ports
#  Image: ghcr.io/zentto-erp/zentto-web/frontend:dev
# ─────────────────────────────────────────────────────────────────────

name: Deploy Frontend (DEV)

on:
  push:
    branches: [developer]
    paths:
      - 'web/modular-frontend/**'
      - 'docker/Dockerfile.frontend'
      - 'docker/pm2.config.cjs'
      # docker-compose.dev.yml y nginx ahora viven en zentto-infra
  workflow_dispatch:

concurrency:
  group: deploy-dev-frontend
  cancel-in-progress: true

env:
  REPO: zentto-erp/zentto-web

jobs:
  # ── 1. Build Docker image (:dev tag) ───────────────────────────────
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: ghcr.io/zentto-erp/zentto-web/frontend:dev
          cache-from: type=gha,scope=frontend-dev
          cache-to: type=gha,mode=max,scope=frontend-dev
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://apidev.zentto.net
            NEXT_PUBLIC_API_BASE=https://apidev.zentto.net
            NEXT_PUBLIC_API_URL=https://apidev.zentto.net
            NEXT_PUBLIC_BACKEND_URL=https://apidev.zentto.net
            NEXT_PUBLIC_SHELL_URL=https://appdev.zentto.net
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=0x4AAAAAACsUe-s-UNo9WDiI
            NEXT_PUBLIC_PADDLE_CLIENT_TOKEN=live_8c250213a8ec06eb59974f48296

  # ── 2. Deploy DEV container ────────────────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # docker-compose y nginx vienen de zentto-infra; solo copiamos pm2 config
          source: "docker/pm2.config.cjs"
          target: /opt/zentto-dev
          overwrite: true

      - name: Deploy Frontend dev container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # ── Mirror production .env.frontend → dev (same secrets, different URLs) ──
            cp /opt/zentto/.env.frontend /opt/zentto-dev/.env.frontend
            chmod 600 /opt/zentto-dev/.env.frontend

            # Override URLs for dev
            sed -i 's|^NEXTAUTH_URL=.*|NEXTAUTH_URL=https://appdev.zentto.net|' /opt/zentto-dev/.env.frontend
            sed -i 's|^BACKEND_URL=.*|BACKEND_URL=http://zentto-api-dev:4000|' /opt/zentto-dev/.env.frontend
            sed -i 's|^API_URL=.*|API_URL=http://zentto-api-dev:4000|' /opt/zentto-dev/.env.frontend

            # Ensure PM2 config is in place
            mkdir -p /opt/zentto-dev/docker
            cp -f /opt/zentto-dev/docker/pm2.config.cjs /opt/zentto-dev/docker/pm2.config.cjs 2>/dev/null || true

            # Sincronizar compose y nginx desde zentto-infra
            if [ -d /opt/zentto-infra ]; then
              cp -f /opt/zentto-infra/compose/docker-compose.dev.yml /opt/zentto-dev/docker-compose.dev.yml 2>/dev/null || true
              mkdir -p /opt/zentto-dev/nginx
              cp -f /opt/zentto-infra/nginx/zentto-dev.conf /opt/zentto-dev/nginx/zentto-dev.conf 2>/dev/null || true
              cp -f /opt/zentto-infra/nginx/zentto-proxy.conf /opt/zentto-dev/nginx/zentto-proxy.conf 2>/dev/null || true
            fi

            # Login to GHCR + deploy
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u zentto-erp --password-stdin
            docker stop zentto-frontend-dev 2>/dev/null || true
            docker rm -f zentto-frontend-dev 2>/dev/null || true
            cd /opt/zentto-dev
            docker compose -f docker-compose.dev.yml pull frontend-dev
            docker compose -f docker-compose.dev.yml up -d --no-deps frontend-dev

            # Nginx desde zentto-infra
            if [ -f /opt/zentto-infra/nginx/zentto-dev.conf ]; then
              cp -f /opt/zentto-infra/nginx/zentto-dev.conf /etc/nginx/sites-available/zentto-dev.conf
              cp -f /opt/zentto-infra/nginx/zentto-proxy.conf /etc/nginx/zentto-proxy.conf 2>/dev/null || true
              ln -sf /etc/nginx/sites-available/zentto-dev.conf /etc/nginx/sites-enabled/zentto-dev.conf
              nginx -t && systemctl reload nginx
            fi
            echo "✅ Frontend DEV deployed → appdev.zentto.net"

  # set-private omitido — el pre-push hook y los workflows de prod manejan la visibilidad
