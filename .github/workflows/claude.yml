name: Claude Code Agent

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && contains(github.event.issue.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Agent
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          model: "claude-sonnet-4-5"
          max_turns: "10"
          custom_instructions: |
            Eres un agente de desarrollo para Zentto ERP.
            Lee SIEMPRE CLAUDE.md antes de empezar cualquier tarea.
            Reglas criticas:
            - Todo cambio SQL va en AMBOS motores: sqlweb/ y sqlweb-pg/
            - Ramas: feature/nombre -> develop (nunca a main directamente)
            - No hacer commits directos a develop ni main
            - Abre un PR con descripcion clara del cambio
            - Fechas siempre en UTC-0
            - No exponer secrets ni credenciales
