name: Deploy Panel (DEV)

on:
  push:
    branches: [developer]
    paths:
      - 'web/modular-frontend/apps/panel/**'
  workflow_dispatch:

concurrency:
  group: deploy-dev-panel
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/zentto-erp/zentto-web/panel:dev

jobs:
  build:
    name: Build & Push Panel (DEV)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Create Dockerfile
        run: |
          cat > Dockerfile.panel << 'DEOF'
          FROM node:22-alpine AS builder
          WORKDIR /app
          COPY web/modular-frontend/apps/panel/package.json ./
          RUN npm install && npm install react@19.0.0 react-dom@19.0.0
          COPY web/modular-frontend/apps/panel/ ./
          ARG NEXT_PUBLIC_SITES_API=https://sitesdev.zentto.net
          ARG NEXT_PUBLIC_AUTH_API=https://authdev.zentto.net
          ENV NEXT_PUBLIC_SITES_API=$NEXT_PUBLIC_SITES_API
          ENV NEXT_PUBLIC_AUTH_API=$NEXT_PUBLIC_AUTH_API
          RUN npx next build

          FROM node:22-alpine
          WORKDIR /app
          ENV NODE_ENV=production PORT=3018 HOSTNAME=0.0.0.0
          COPY --from=builder /app/.next ./.next
          COPY --from=builder /app/node_modules ./node_modules
          COPY --from=builder /app/package.json ./
          COPY --from=builder /app/public ./public 2>/dev/null || true
          EXPOSE 3018
          CMD ["npx", "next", "start", "-p", "3018"]
          DEOF

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.panel
          push: true
          tags: ${{ env.IMAGE }}

  deploy:
    name: Deploy Panel (DEV)
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GITHUB_ACTOR
          script: |
            set -e
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            docker pull ghcr.io/zentto-erp/zentto-web/panel:dev
            cd /opt/zentto-sites
            docker compose up -d --force-recreate --no-deps sites-panel-dev
            sleep 15
            curl -fsS http://127.0.0.1:3028 >/dev/null
            docker image prune -f
            echo "✓ Panel (DEV) deployed: $(date -u)"
