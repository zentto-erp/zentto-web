name: Security

on:
  push:
    branches: [main, developer, master]
  pull_request:
    branches: [main, developer, master]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  # Security scan informa findings pero SOLO bloquea en CRITICAL (ERROR).
  # Los WARNINGs (high) se revisan y corrigen progresivamente en features
  # dedicadas. Cuando queden pocos, se puede endurecer prod a fail-on=high.
  # Política actual: never bloquear deploys por WARNING.
  security:
    uses: zentto-erp/.github/.github/workflows/security.yml@main
    with:
      fail-on: critical
    secrets: inherit
