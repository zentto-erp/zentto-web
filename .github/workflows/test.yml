name: Tests API

on:
  push:
    branches: [main]
    paths:
      - 'web/api/**'
  pull_request:
    branches: [main]
    paths:
      - 'web/api/**'
  workflow_dispatch:

concurrency:
  group: test-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: TypeScript Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHCR_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/api/package-lock.json

      - name: Install dependencies
        working-directory: web/api
        run: npm ci

      - name: TypeScript build check
        working-directory: web/api
        run: npx tsc -p tsconfig.build.json --noEmit

      - name: Audit OpenAPI coverage
        working-directory: web/api
        run: npm run audit:openapi

  schema-contracts:
    name: SP Contract Tests (PostgreSQL)
    runs-on: ubuntu-22.04
    needs: type-check
    # Bloqueante — un fallo aquí detiene el deploy
    # continue-on-error eliminado intencionalmente

    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_USER: zentto_app
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: zentto_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHCR_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/api/package-lock.json

      - name: Install dependencies
        working-directory: web/api
        run: npm ci

      - name: Bootstrap schema (goose-style cold bootstrap)
        working-directory: web/api
        env:
          PGPASSWORD: test_password
          PG_HOST: 127.0.0.1
          PG_PORT: 5432
          PG_DATABASE: zentto_test
          PG_USER: zentto_app
          PG_PASSWORD: test_password
          DB_TYPE: postgres
        run: |
          # CI debe validar el mismo flujo de tenant provisioning:
          # extensiones -> goose up -> run-functions -> seeds config/starter.
          psql -h 127.0.0.1 -U zentto_app -d zentto_test -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          psql -h 127.0.0.1 -U zentto_app -d zentto_test -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS unaccent;"
          psql -h 127.0.0.1 -U zentto_app -d zentto_test -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
          psql -h 127.0.0.1 -U zentto_app -d zentto_test -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";"
          psql -h 127.0.0.1 -U zentto_app -d zentto_test -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS btree_gin;"
          curl -fsSL -o /usr/local/bin/goose https://github.com/pressly/goose/releases/download/v3.24.1/goose_linux_x86_64
          chmod +x /usr/local/bin/goose
          bash ../../scripts/migrate.sh up
          cd sqlweb-pg
          psql -h 127.0.0.1 -U zentto_app -d zentto_test -v ON_ERROR_STOP=1 -f run-functions.sql
          psql -h 127.0.0.1 -U zentto_app -d zentto_test -v ON_ERROR_STOP=1 -f run-seeds-config.sql
          psql -h 127.0.0.1 -U zentto_app -d zentto_test -v ON_ERROR_STOP=1 -f run-seeds-starter.sql

      - name: Run SP contract tests
        working-directory: web/api
        env:
          PG_HOST: 127.0.0.1
          PG_PORT: 5432
          PG_DATABASE: zentto_test
          PG_USER: zentto_app
          PG_PASSWORD: test_password
        run: npm run test:schema

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: web/api/test-results/
          if-no-files-found: ignore

  smoke-tests:
    name: API Smoke Tests
    runs-on: ubuntu-22.04
    continue-on-error: true
    # Los smoke tests requieren la API corriendo — se ejecutan en staging
    # Por ahora solo validan sintaxis y tipos
    if: false  # Habilitar cuando se configure staging environment
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHCR_PAT }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: web/api
        run: npm ci
      - name: Run smoke tests
        working-directory: web/api
        env:
          API_BASE_URL: ${{ vars.STAGING_API_URL }}
        run: npm run test:smoke
