name: Tests API

on:
  push:
    branches: [main]
    paths:
      - 'web/api/**'
  pull_request:
    branches: [main]
    paths:
      - 'web/api/**'
  workflow_dispatch:

concurrency:
  group: test-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: TypeScript Check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHCR_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/api/package-lock.json

      - name: Install dependencies
        working-directory: web/api
        run: npm ci

      - name: TypeScript build check
        working-directory: web/api
        run: npx tsc -p tsconfig.build.json --noEmit

      - name: Audit OpenAPI coverage
        working-directory: web/api
        run: npm run audit:openapi

  schema-contracts:
    name: SP Contract Tests (PostgreSQL)
    runs-on: ubuntu-22.04
    needs: type-check
    # Bloqueante — un fallo aquí detiene el deploy
    # continue-on-error eliminado intencionalmente

    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_USER: zentto_app
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: zentto_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHCR_PAT }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/api/package-lock.json

      - name: Install dependencies
        working-directory: web/api
        run: npm ci

      - name: Bootstrap schema (goose-style cold bootstrap)
        working-directory: web/api
        env:
          PGPASSWORD: test_password
          PG_HOST: 127.0.0.1
          PG_PORT: 5432
          PG_DATABASE: zentto_test
          PG_USER: zentto_app
          PG_PASSWORD: test_password
          DB_TYPE: postgres
        run: |
          # Bootstrap from baseline (pg_dump of zentto_dev)
          cd sqlweb-pg
          for f in baseline/000_schemas.sql baseline/001_extensions.sql baseline/002_types.sql \
                   baseline/003_tables.sql baseline/004_sequences.sql baseline/005_functions.sql \
                   baseline/006_indexes.sql baseline/007_constraints.sql baseline/008_triggers.sql; do
            echo "  $(basename $f)..."
            psql -h 127.0.0.1 -U zentto_app -d zentto_test -v ON_ERROR_STOP=1 < "$f"
          done
          echo "  seeds..."
          psql -h 127.0.0.1 -U zentto_app -d zentto_test -c "SET session_replication_role = 'replica';"
          psql -h 127.0.0.1 -U zentto_app -d zentto_test < seeds/001_seed_data.sql || true
          psql -h 127.0.0.1 -U zentto_app -d zentto_test -c "SET session_replication_role = 'origin';"

      - name: Run SP contract tests
        working-directory: web/api
        env:
          PG_HOST: 127.0.0.1
          PG_PORT: 5432
          PG_DATABASE: zentto_test
          PG_USER: zentto_app
          PG_PASSWORD: test_password
        run: npx vitest run tests/schema/sp-contracts.test.ts

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_number }}
          path: web/api/test-results/
          if-no-files-found: ignore

  smoke-tests:
    name: API Smoke Tests
    runs-on: ubuntu-22.04
    continue-on-error: true
    # Los smoke tests requieren la API corriendo — se ejecutan en staging
    # Por ahora solo validan sintaxis y tipos
    if: false  # Habilitar cuando se configure staging environment
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHCR_PAT }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: web/api
        run: npm ci
      - name: Run smoke tests
        working-directory: web/api
        env:
          API_BASE_URL: ${{ vars.STAGING_API_URL }}
        run: npm run test:smoke
