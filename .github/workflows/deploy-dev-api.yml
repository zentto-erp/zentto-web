# ─────────────────────────────────────────────────────────────────────
#  Deploy API → DEV environment (api.dev.zentto.net)
#
#  Trigger: push to developer branch (web/api/**)
#  Target: Same Hetzner server, separate containers + DB + ports
#  Image: ghcr.io/zentto-erp/zentto-web/api:dev
# ─────────────────────────────────────────────────────────────────────

name: Deploy API (DEV)

on:
  push:
    branches: [developer]
    paths:
      - 'web/api/**'
      - 'docker/Dockerfile.api'
      - 'docker-compose.dev.yml'
      - 'scripts/goose-deploy.sh'
      - 'scripts/goose-deploy-all.sh'
  workflow_dispatch:

concurrency:
  group: deploy-dev-api
  cancel-in-progress: true

jobs:
  # ── 1. Type check ──────────────────────────────────────────────────
  type-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/api/package-lock.json
      - run: npm ci
      - run: npx tsc -p tsconfig.build.json --noEmit

  # ── 2. Schema tests ───────────────────────────────────────────────
  schema-tests:
    needs: type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/api
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: zentto_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PG_HOST: localhost
      PG_PORT: 5432
      PG_USER: postgres
      PG_PASSWORD: postgres
      PG_DATABASE: zentto_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/api/package-lock.json
      - run: npm ci

      - name: Bootstrap PG extensions
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d zentto_test -c "
            CREATE EXTENSION IF NOT EXISTS pgcrypto;
            CREATE EXTENSION IF NOT EXISTS unaccent;
            CREATE EXTENSION IF NOT EXISTS pg_trgm;
            CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
            CREATE EXTENSION IF NOT EXISTS btree_gin;
          "

      - name: Download goose
        run: |
          curl -fsSL https://github.com/pressly/goose/releases/download/v3.24.1/goose_linux_x86_64 -o /usr/local/bin/goose
          chmod +x /usr/local/bin/goose

      - name: Run migrations
        run: bash ../../scripts/migrate.sh up

      - name: Load functions + seeds
        working-directory: web/api/sqlweb-pg
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d zentto_test -f run-functions.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d zentto_test -f run-seeds-config.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d zentto_test -f run-seeds-starter.sql

      - name: Run schema contract tests
        run: npm run test:schema

  # ── 3. Build Docker image (:dev tag) ───────────────────────────────
  build:
    needs: schema-tests
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ghcr.io/zentto-erp/zentto-web/api:dev
          cache-from: type=gha,scope=api-dev
          cache-to: type=gha,mode=max,scope=api-dev

  # ── 4. Migrate DEV database ───────────────────────────────────────
  migrate-pg:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy migrations to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "web/api/migrations/postgres,web/api/sqlweb-pg,scripts/goose-deploy.sh,scripts/goose-deploy-all.sh"
          target: /opt/zentto-dev/_deploy_tmp
          overwrite: true

      - name: Run goose migrations on zentto_dev
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            mkdir -p /opt/zentto-dev/migrations/postgres /opt/zentto-dev/sqlweb-pg
            cp -rf /opt/zentto-dev/_deploy_tmp/web/api/migrations/postgres/* /opt/zentto-dev/migrations/postgres/
            cp -rf /opt/zentto-dev/_deploy_tmp/web/api/sqlweb-pg/* /opt/zentto-dev/sqlweb-pg/
            cp -f /opt/zentto-dev/_deploy_tmp/scripts/goose-deploy.sh /opt/zentto-dev/goose-deploy.sh
            chmod +x /opt/zentto-dev/goose-deploy.sh

            # Run migrations on zentto_dev database only (no tenants)
            PG_DATABASE=zentto_dev \
            GOOSE_DIR=/opt/zentto-dev/migrations/postgres \
            SEEDS_DIR=/opt/zentto-dev/sqlweb-pg \
            SEEDS_TYPE=all \
            bash /opt/zentto-dev/goose-deploy.sh

            rm -rf /opt/zentto-dev/_deploy_tmp

  # ── 5. Deploy DEV container ────────────────────────────────────────
  deploy:
    needs: migrate-pg
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.dev.yml,nginx/zentto-dev.conf,nginx/zentto-proxy.conf"
          target: /opt/zentto-dev
          overwrite: true

      - name: Deploy API dev container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # Ensure dev env file exists
            touch /opt/zentto-dev/.env.api
            chmod 600 /opt/zentto-dev/.env.api

            # Sync critical env vars for dev
            grep -q "^DB_TYPE=" /opt/zentto-dev/.env.api || echo "DB_TYPE=postgres" >> /opt/zentto-dev/.env.api
            grep -q "^PG_DATABASE=" /opt/zentto-dev/.env.api || echo "PG_DATABASE=zentto_dev" >> /opt/zentto-dev/.env.api
            grep -q "^PG_HOST=" /opt/zentto-dev/.env.api || echo "PG_HOST=172.18.0.1" >> /opt/zentto-dev/.env.api
            grep -q "^PORT=" /opt/zentto-dev/.env.api || echo "PORT=4000" >> /opt/zentto-dev/.env.api
            grep -q "^NODE_ENV=" /opt/zentto-dev/.env.api || echo "NODE_ENV=development" >> /opt/zentto-dev/.env.api

            # Login to GHCR
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u zentto-erp --password-stdin

            # Pull and restart dev API
            cd /opt/zentto-dev
            docker compose -f docker-compose.dev.yml pull api-dev
            docker compose -f docker-compose.dev.yml up -d --force-recreate --no-deps api-dev

            # Health check
            sleep 5
            curl -fsS http://127.0.0.1:4100/health || echo "⚠️ Health check failed — check logs"

            # Update nginx
            cp -f /opt/zentto-dev/nginx/zentto-dev.conf /etc/nginx/sites-available/zentto-dev.conf
            cp -f /opt/zentto-dev/nginx/zentto-proxy.conf /etc/nginx/zentto-proxy.conf
            ln -sf /etc/nginx/sites-available/zentto-dev.conf /etc/nginx/sites-enabled/zentto-dev.conf
            nginx -t && systemctl reload nginx

            echo "✅ API DEV deployed → api.dev.zentto.net"
