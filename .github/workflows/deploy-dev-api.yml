# ─────────────────────────────────────────────────────────────────────
#  Deploy API → DEV environment (api.dev.zentto.net)
#
#  Trigger: push to developer branch (web/api/**)
#  Target: Same Hetzner server, separate containers + DB + ports
#  Image: ghcr.io/zentto-erp/zentto-web/api:dev
# ─────────────────────────────────────────────────────────────────────

name: Deploy API (DEV)

on:
  push:
    branches: [developer]
    paths:
      - 'web/api/**'
      - 'docker/Dockerfile.api'
      - 'docker-compose.dev.yml'
      - 'scripts/goose-deploy.sh'
      - 'scripts/goose-deploy-all.sh'
  workflow_dispatch:

concurrency:
  group: deploy-dev-api
  cancel-in-progress: true

jobs:
  # ── 1. Type check ──────────────────────────────────────────────────
  type-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/api/package-lock.json
      - run: npm ci
      - run: npx tsc -p tsconfig.build.json --noEmit

  # ── 2. Schema tests ───────────────────────────────────────────────
  schema-tests:
    needs: type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/api
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_USER: zentto_app
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: zentto_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ['5432:5432']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/api/package-lock.json
      - run: npm ci

      - name: Bootstrap schema (goose-style cold bootstrap)
        env:
          PGPASSWORD: test_password
          PG_HOST: 127.0.0.1
          PG_PORT: 5432
          PG_DATABASE: zentto_test
          PG_USER: zentto_app
          PG_PASSWORD: test_password
          DB_TYPE: postgres
        run: |
          psql -h 127.0.0.1 -U zentto_app -d zentto_test -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS pgcrypto;"
          psql -h 127.0.0.1 -U zentto_app -d zentto_test -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS unaccent;"
          psql -h 127.0.0.1 -U zentto_app -d zentto_test -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"
          psql -h 127.0.0.1 -U zentto_app -d zentto_test -v ON_ERROR_STOP=1 -c 'CREATE EXTENSION IF NOT EXISTS "uuid-ossp";'
          psql -h 127.0.0.1 -U zentto_app -d zentto_test -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS btree_gin;"
          curl -fsSL -o /usr/local/bin/goose https://github.com/pressly/goose/releases/download/v3.24.1/goose_linux_x86_64
          chmod +x /usr/local/bin/goose
          bash ../../scripts/migrate.sh up
          cd sqlweb-pg
          psql -h 127.0.0.1 -U zentto_app -d zentto_test -v ON_ERROR_STOP=1 -f run-functions.sql
          psql -h 127.0.0.1 -U zentto_app -d zentto_test -v ON_ERROR_STOP=1 -f run-seeds-config.sql
          psql -h 127.0.0.1 -U zentto_app -d zentto_test -v ON_ERROR_STOP=1 -f run-seeds-starter.sql

      - name: Run schema contract tests
        env:
          PG_HOST: 127.0.0.1
          PG_PORT: 5432
          PG_USER: zentto_app
          PG_PASSWORD: test_password
          PG_DATABASE: zentto_test
          DB_TYPE: postgres
        run: npm run test:schema

  # ── 3. Build Docker image (:dev tag) ───────────────────────────────
  build:
    needs: schema-tests
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ghcr.io/zentto-erp/zentto-web/api:dev
          cache-from: type=gha,scope=api-dev
          cache-to: type=gha,mode=max,scope=api-dev

  # ── 4. Setup + Migrate DEV database ─────────────────────────────────
  migrate-pg:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup dev environment (idempotent)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "==> Setting up dev environment..."

            # Create directories
            mkdir -p /opt/zentto-dev/{migrations/postgres,sqlweb-pg,docker,nginx,logs}

            # Create Docker volume
            docker volume create zentto_api_storage_dev 2>/dev/null || true

            # Create dev database if not exists
            sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname = 'zentto_dev'" | grep -q 1 || {
              sudo -u postgres psql -c "CREATE DATABASE zentto_dev OWNER zentto_app;"
              echo "  DB zentto_dev created"
            }

            # Extensions
            sudo -u postgres psql -d zentto_dev -c "
              CREATE EXTENSION IF NOT EXISTS pgcrypto;
              CREATE EXTENSION IF NOT EXISTS unaccent;
              CREATE EXTENSION IF NOT EXISTS pg_trgm;
              CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
              CREATE EXTENSION IF NOT EXISTS btree_gin;
            "

            # Schemas + grants
            for schema in acct ap ar audit cfg doc fin fiscal hr master pay pos public rest sec store inv logistics crm mfg fleet zsys; do
              sudo -u postgres psql -d zentto_dev -c "
                CREATE SCHEMA IF NOT EXISTS $schema;
                GRANT ALL ON SCHEMA $schema TO zentto_app;
              " 2>/dev/null || true
            done

            # pg_hba.conf for zentto_dev
            PG_HBA=$(sudo -u postgres psql -tc "SHOW hba_file" | xargs)
            grep -q "zentto_dev" "$PG_HBA" 2>/dev/null || {
              echo "host    zentto_dev    zentto_app    172.18.0.0/16    scram-sha-256" >> "$PG_HBA"
              systemctl reload postgresql
            }

            echo "==> Dev environment ready"

      - name: Copy migrations to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "web/api/migrations/postgres,web/api/sqlweb-pg,scripts/goose-deploy.sh,scripts/goose-deploy-all.sh"
          target: /opt/zentto-dev/_deploy_tmp
          overwrite: true

      - name: Run goose migrations on zentto_dev
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            mkdir -p /opt/zentto-dev/migrations/postgres /opt/zentto-dev/sqlweb-pg
            cp -rf /opt/zentto-dev/_deploy_tmp/web/api/migrations/postgres/* /opt/zentto-dev/migrations/postgres/
            cp -rf /opt/zentto-dev/_deploy_tmp/web/api/sqlweb-pg/* /opt/zentto-dev/sqlweb-pg/
            cp -f /opt/zentto-dev/_deploy_tmp/scripts/goose-deploy.sh /opt/zentto-dev/goose-deploy.sh
            chmod +x /opt/zentto-dev/goose-deploy.sh

            # Run migrations on zentto_dev database only (no tenants)
            PG_DATABASE=zentto_dev \
            GOOSE_DIR=/opt/zentto-dev/migrations/postgres \
            SEEDS_DIR=/opt/zentto-dev/sqlweb-pg \
            SEEDS_TYPE=all \
            bash /opt/zentto-dev/goose-deploy.sh

            rm -rf /opt/zentto-dev/_deploy_tmp

  # ── 5. Deploy DEV container ────────────────────────────────────────
  deploy:
    needs: migrate-pg
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.dev.yml,nginx/zentto-dev.conf,nginx/zentto-proxy.conf"
          target: /opt/zentto-dev
          overwrite: true

      - name: Deploy API dev container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            # ── Mirror production .env.api → dev (same secrets, different DB/URLs) ──
            # Start from production as base
            cp /opt/zentto/.env.api /opt/zentto-dev/.env.api
            chmod 600 /opt/zentto-dev/.env.api

            # Override only what differs for dev
            sed -i 's|^PG_DATABASE=.*|PG_DATABASE=zentto_dev|' /opt/zentto-dev/.env.api
            sed -i 's|^NODE_ENV=.*|NODE_ENV=development|' /opt/zentto-dev/.env.api
            sed -i 's|^CORS_ORIGINS=.*|CORS_ORIGINS=https://dev.zentto.net,https://app.dev.zentto.net|' /opt/zentto-dev/.env.api
            sed -i 's|^AUTH_PUBLIC_URL=.*|AUTH_PUBLIC_URL=https://dev.zentto.net|' /opt/zentto-dev/.env.api
            sed -i 's|^STORE_URL=.*|STORE_URL=https://app.dev.zentto.net|' /opt/zentto-dev/.env.api

            # Dev-friendly auth settings
            sed -i 's|^AUTH_REQUIRE_EMAIL_VERIFICATION=.*|AUTH_REQUIRE_EMAIL_VERIFICATION=false|' /opt/zentto-dev/.env.api
            sed -i 's|^AUTH_LOGIN_REQUIRE_CAPTCHA=.*|AUTH_LOGIN_REQUIRE_CAPTCHA=false|' /opt/zentto-dev/.env.api

            # Login to GHCR
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u zentto-erp --password-stdin

            # Pull and restart dev API
            cd /opt/zentto-dev
            docker compose -f docker-compose.dev.yml pull api-dev
            docker compose -f docker-compose.dev.yml up -d --force-recreate --no-deps api-dev

            # Health check
            sleep 5
            curl -fsS http://127.0.0.1:4100/health || echo "⚠️ Health check failed — check logs"

            # Update nginx
            cp -f /opt/zentto-dev/nginx/zentto-dev.conf /etc/nginx/sites-available/zentto-dev.conf
            cp -f /opt/zentto-dev/nginx/zentto-proxy.conf /etc/nginx/zentto-proxy.conf
            ln -sf /etc/nginx/sites-available/zentto-dev.conf /etc/nginx/sites-enabled/zentto-dev.conf
            nginx -t && systemctl reload nginx

            echo "✅ API DEV deployed → api.dev.zentto.net (espejo de prod con BD zentto_dev)"
