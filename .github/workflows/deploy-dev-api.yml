# ─────────────────────────────────────────────────────────────────────
#  Deploy API → DEV environment (apidev.zentto.net)
#
#  Trigger: push to developer branch (web/api/**)
#  Target: Same Hetzner server, separate containers + DB + ports
#  Image: ghcr.io/zentto-erp/zentto-web/api:dev
# ─────────────────────────────────────────────────────────────────────

name: Deploy API (DEV)

on:
  push:
    branches: [developer]
    paths:
      - 'web/api/**'
      - 'docker/Dockerfile.api'
      # docker-compose.dev.yml y goose-deploy ahora viven en zentto-infra
  workflow_dispatch:

concurrency:
  group: deploy-dev-api
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  actions: write

env:
  REPO: zentto-erp/zentto-web

jobs:
  # ── 0. Make repo public for GHCR access ────────────────────────────
  set-public:
    runs-on: ubuntu-latest
    steps:
      - run: |
          curl -sS -X PATCH \
            -H "Authorization: token ${{ secrets.GHCR_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ env.REPO }} \
            -d '{"visibility":"public"}' | grep -o '"visibility":"[^"]*"' || true

  # ── 1. Type check ──────────────────────────────────────────────────
  type-check:
    needs: set-public
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/api
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHCR_PAT }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/api/package-lock.json
      - run: npm ci
      - run: npx tsc -p tsconfig.build.json --noEmit

  # ── 2. Schema tests ───────────────────────────────────────────────
  schema-tests:
    needs: type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/api
    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:16
        env:
          POSTGRES_USER: zentto_app
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: zentto_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ['5432:5432']
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHCR_PAT }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/api/package-lock.json
      - run: npm ci

      - name: Bootstrap schema from baseline
        env:
          PGPASSWORD: test_password
        run: |
          echo "==> Applying baseline layers..."
          for f in sqlweb-pg/baseline/000_schemas.sql \
                   sqlweb-pg/baseline/001_extensions.sql \
                   sqlweb-pg/baseline/002_types.sql \
                   sqlweb-pg/baseline/003_tables.sql \
                   sqlweb-pg/baseline/004_sequences.sql \
                   sqlweb-pg/baseline/005_functions.sql \
                   sqlweb-pg/baseline/006_indexes.sql \
                   sqlweb-pg/baseline/007_constraints.sql \
                   sqlweb-pg/baseline/008_triggers.sql; do
            echo "  $(basename $f)..."
            psql -h 127.0.0.1 -U zentto_app -d zentto_test -v ON_ERROR_STOP=1 < "$f"
          done
          echo "==> Applying seeds..."
          psql -h 127.0.0.1 -U zentto_app -d zentto_test -c "SET session_replication_role = 'replica';"
          psql -h 127.0.0.1 -U zentto_app -d zentto_test < sqlweb-pg/seeds/001_seed_data.sql || true
          psql -h 127.0.0.1 -U zentto_app -d zentto_test -c "SET session_replication_role = 'origin';"
          echo "==> Verifying: zero overloads..."
          psql -h 127.0.0.1 -U zentto_app -d zentto_test -c "SELECT proname, COUNT(*) FROM pg_proc p JOIN pg_namespace n ON n.oid=p.pronamespace WHERE n.nspname='public' AND p.proname LIKE 'usp_%' GROUP BY proname HAVING COUNT(*)>1;"

      - name: Run schema contract tests
        env:
          PG_HOST: 127.0.0.1
          PG_PORT: 5432
          PG_USER: zentto_app
          PG_PASSWORD: test_password
          PG_DATABASE: zentto_test
          DB_TYPE: postgres
        run: npx vitest run tests/schema/sp-contracts.test.ts

  # ── 3. Build Docker image (:dev tag) ───────────────────────────────
  build:
    needs: schema-tests
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHCR_PAT }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ghcr.io/zentto-erp/zentto-web/api:dev
          cache-from: type=gha,scope=api-dev
          cache-to: type=gha,mode=max,scope=api-dev

  # ── 4. Setup + Migrate DEV database ─────────────────────────────────
  migrate-pg:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHCR_PAT }}

      - name: Setup dev environment (idempotent)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "==> Setting up dev environment..."

            # Create directories
            mkdir -p /opt/zentto-dev/{migrations/postgres,sqlweb-pg,docker,nginx,logs}

            # Create Docker volume
            docker volume create zentto_api_storage_dev 2>/dev/null || true

            # Create dev database if not exists
            sudo -u postgres psql -tc "SELECT 1 FROM pg_database WHERE datname = 'zentto_dev'" | grep -q 1 || {
              sudo -u postgres psql -c "CREATE DATABASE zentto_dev OWNER zentto_app;"
              echo "  DB zentto_dev created"
            }

            # Extensions
            sudo -u postgres psql -d zentto_dev -c "
              CREATE EXTENSION IF NOT EXISTS pgcrypto;
              CREATE EXTENSION IF NOT EXISTS unaccent;
              CREATE EXTENSION IF NOT EXISTS pg_trgm;
              CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
              CREATE EXTENSION IF NOT EXISTS btree_gin;
            "

            # Schemas + grants
            for schema in acct ap ar audit cfg doc fin fiscal hr master pay pos public rest sec store inv logistics crm mfg fleet zsys; do
              sudo -u postgres psql -d zentto_dev -c "
                CREATE SCHEMA IF NOT EXISTS $schema;
                GRANT ALL ON SCHEMA $schema TO zentto_app;
              " 2>/dev/null || true
            done

            # pg_hba.conf for zentto_dev
            PG_HBA=$(sudo -u postgres psql -tc "SHOW hba_file" | xargs)
            grep -q "zentto_dev" "$PG_HBA" 2>/dev/null || {
              echo "host    zentto_dev    zentto_app    172.18.0.0/16    scram-sha-256" >> "$PG_HBA"
              systemctl reload postgresql
            }

            echo "==> Dev environment ready"

      - name: Copy migrations to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "web/api/migrations/postgres,web/api/sqlweb-pg"
          target: /opt/zentto-dev/_deploy_tmp
          overwrite: true

      - name: Run goose migrations on zentto_dev
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            # Clean old files and copy fresh from deploy
            rm -rf /opt/zentto-dev/migrations/postgres /opt/zentto-dev/sqlweb-pg
            mkdir -p /opt/zentto-dev/migrations/postgres /opt/zentto-dev/sqlweb-pg
            cp -rf /opt/zentto-dev/_deploy_tmp/web/api/migrations/postgres/* /opt/zentto-dev/migrations/postgres/
            cp -rf /opt/zentto-dev/_deploy_tmp/web/api/sqlweb-pg/* /opt/zentto-dev/sqlweb-pg/
            # goose-deploy viene de zentto-infra
            if [ -f /opt/zentto-infra/scripts/goose-deploy.sh ]; then
              cp -f /opt/zentto-infra/scripts/goose-deploy.sh /opt/zentto-dev/goose-deploy.sh
              chmod +x /opt/zentto-dev/goose-deploy.sh
            fi

            # Check if goose thinks all migrations are applied
            GOOSE_MAX=$(ls /opt/zentto-dev/migrations/postgres/*.sql 2>/dev/null | wc -l)
            GOOSE_APPLIED=$(sudo -u postgres psql -d zentto_dev -tAc "SELECT count(*) FROM public.goose_db_version WHERE is_applied=TRUE" 2>/dev/null || echo "0")

            # If goose is out of sync (partial state from failed deploys), drop and recreate
            if [ "$GOOSE_APPLIED" -gt "0" ] && [ "$GOOSE_APPLIED" -lt "$GOOSE_MAX" ]; then
              echo "==> DB in inconsistent state (goose: $GOOSE_APPLIED/$GOOSE_MAX) — recreating..."
              # Terminate active connections before dropping
              sudo -u postgres psql -c "SELECT pg_terminate_backend(pid) FROM pg_stat_activity WHERE datname='zentto_dev' AND pid <> pg_backend_pid();" || true
              sudo -u postgres psql -c "DROP DATABASE IF EXISTS zentto_dev;"
              sudo -u postgres psql -c "CREATE DATABASE zentto_dev OWNER zentto_app;"
              sudo -u postgres psql -d zentto_dev -c "
                CREATE EXTENSION IF NOT EXISTS pgcrypto;
                CREATE EXTENSION IF NOT EXISTS unaccent;
                CREATE EXTENSION IF NOT EXISTS pg_trgm;
                CREATE EXTENSION IF NOT EXISTS \"uuid-ossp\";
                CREATE EXTENSION IF NOT EXISTS btree_gin;
              "
              for schema in acct ap ar audit cfg doc fin fiscal hr master pay pos public rest sec store inv logistics crm mfg fleet zsys; do
                sudo -u postgres psql -d zentto_dev -c "CREATE SCHEMA IF NOT EXISTS $schema; GRANT ALL ON SCHEMA $schema TO zentto_app;" 2>/dev/null || true
              done
            fi

            TABLE_COUNT=$(sudo -u postgres psql -d zentto_dev -tAc "SELECT count(*) FROM information_schema.tables WHERE table_schema NOT IN ('pg_catalog','information_schema')")
            if [ "$TABLE_COUNT" -lt "10" ]; then
              echo "==> Fresh DB detected ($TABLE_COUNT tables) — running baseline bootstrap..."
              cd /opt/zentto-dev/sqlweb-pg

              # Apply baseline layers in order
              for f in baseline/000_schemas.sql baseline/001_extensions.sql baseline/002_types.sql \
                       baseline/003_tables.sql baseline/004_sequences.sql baseline/005_functions.sql \
                       baseline/006_indexes.sql baseline/007_constraints.sql baseline/008_triggers.sql; do
                echo "  $(basename $f)..."
                sudo -u postgres psql -d zentto_dev -v ON_ERROR_STOP=1 < "$f"
              done

              # Seeds with FK disabled
              echo "  seeds..."
              sudo -u postgres psql -d zentto_dev -c "SET session_replication_role = 'replica';"
              sudo -u postgres psql -d zentto_dev < seeds/001_seed_data.sql || true
              sudo -u postgres psql -d zentto_dev -c "SET session_replication_role = 'origin';"

              # Grants
              for schema in acct ap ar audit cfg doc fin fiscal hr master pay pos public rest sec store inv logistics crm mfg fleet zsys; do
                sudo -u postgres psql -d zentto_dev -c "GRANT ALL ON SCHEMA $schema TO zentto_app; GRANT ALL ON ALL TABLES IN SCHEMA $schema TO zentto_app; GRANT ALL ON ALL SEQUENCES IN SCHEMA $schema TO zentto_app;" 2>/dev/null || true
              done

              # Mark ALL goose migrations as applied
              echo "==> Marking all migrations as applied..."
              sudo -u postgres psql -d zentto_dev -c "
                CREATE TABLE IF NOT EXISTS public.goose_db_version (
                  id SERIAL PRIMARY KEY, version_id BIGINT NOT NULL,
                  is_applied BOOLEAN NOT NULL, tstamp TIMESTAMP DEFAULT NOW()
                );
                INSERT INTO public.goose_db_version (version_id, is_applied) VALUES (0, TRUE) ON CONFLICT DO NOTHING;
              "
              GOOSE_DIR=/opt/zentto-dev/migrations/postgres
              for f in $(ls "$GOOSE_DIR"/*.sql | sort); do
                VER=$(basename "$f" | grep -o '^[0-9]*')
                VER_INT=$((10#$VER))
                sudo -u postgres psql -d zentto_dev -c \
                  "INSERT INTO public.goose_db_version (version_id, is_applied) VALUES ($VER_INT, TRUE) ON CONFLICT DO NOTHING;" 2>/dev/null || true
              done
              echo "==> Baseline bootstrap complete"
            fi

            # Run goose migrations on zentto_dev (only new ones after last marked)
            PG_DATABASE=zentto_dev \
            GOOSE_DIR=/opt/zentto-dev/migrations/postgres \
            SEEDS_DIR=/opt/zentto-dev/sqlweb-pg \
            SEEDS_TYPE=all \
            SKIP_HOTFIX=1 \
            bash /opt/zentto-dev/goose-deploy.sh

            rm -rf /opt/zentto-dev/_deploy_tmp

  # ── 5. Deploy DEV container ────────────────────────────────────────
  deploy:
    needs: migrate-pg
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GHCR_PAT }}
      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Solo copiamos archivos que aun NO estan en zentto-infra (ninguno por ahora)
          # docker-compose.dev.yml y nginx vienen de zentto-infra
          source: "docker/pm2.config.cjs"
          target: /opt/zentto-dev
          overwrite: true

      - name: Deploy API dev container
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN
          script: |
            set -e

            # ── Mirror production .env.api → dev (same secrets, different DB/URLs) ──
            cp /opt/zentto/.env.api /opt/zentto-dev/.env.api
            chmod 600 /opt/zentto-dev/.env.api

            # Override only what differs for dev
            sed -i 's|^PG_DATABASE=.*|PG_DATABASE=zentto_dev|' /opt/zentto-dev/.env.api
            sed -i 's|^NODE_ENV=.*|NODE_ENV=development|' /opt/zentto-dev/.env.api
            sed -i 's|^CORS_ORIGINS=.*|CORS_ORIGINS=https://appdev.zentto.net,https://appdev.zentto.net|' /opt/zentto-dev/.env.api
            sed -i 's|^AUTH_PUBLIC_URL=.*|AUTH_PUBLIC_URL=https://appdev.zentto.net|' /opt/zentto-dev/.env.api
            sed -i 's|^STORE_URL=.*|STORE_URL=https://appdev.zentto.net|' /opt/zentto-dev/.env.api

            # Dev-friendly auth settings
            sed -i 's|^AUTH_REQUIRE_EMAIL_VERIFICATION=.*|AUTH_REQUIRE_EMAIL_VERIFICATION=false|' /opt/zentto-dev/.env.api
            sed -i 's|^AUTH_LOGIN_REQUIRE_CAPTCHA=.*|AUTH_LOGIN_REQUIRE_CAPTCHA=false|' /opt/zentto-dev/.env.api

            # Cache URL — dev uses same cache container (shared network)
            sed -i 's|^ZENTTO_CACHE_URL=.*|ZENTTO_CACHE_URL=http://zentto-cache:4100|' /opt/zentto-dev/.env.api

            # Auth Service URL — dev uses auth-dev container
            sed -i 's|^AUTH_SERVICE_URL=.*|AUTH_SERVICE_URL=http://zentto-auth-dev:4600|' /opt/zentto-dev/.env.api

            # Login to GHCR
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

            # Stop and remove existing dev API container (release port 4100)
            docker stop zentto-api-dev 2>/dev/null || true
            docker rm -f zentto-api-dev 2>/dev/null || true
            sleep 2

            # Sincronizar compose y nginx desde zentto-infra
            if [ -d /opt/zentto-infra ]; then
              cp -f /opt/zentto-infra/compose/docker-compose.dev.yml /opt/zentto-dev/docker-compose.dev.yml 2>/dev/null || true
              mkdir -p /opt/zentto-dev/nginx
              cp -f /opt/zentto-infra/nginx/zentto-dev.conf /opt/zentto-dev/nginx/zentto-dev.conf 2>/dev/null || true
              cp -f /opt/zentto-infra/nginx/zentto-proxy.conf /opt/zentto-dev/nginx/zentto-proxy.conf 2>/dev/null || true
            fi

            # Pull and start dev API
            cd /opt/zentto-dev
            docker compose -f docker-compose.dev.yml pull api-dev
            docker compose -f docker-compose.dev.yml up -d --no-deps api-dev

            # Health check
            sleep 5
            curl -fsS http://127.0.0.1:4200/health || echo "⚠️ Health check failed — check logs"

            # Update nginx
            cp -f /opt/zentto-dev/nginx/zentto-dev.conf /etc/nginx/sites-available/zentto-dev.conf
            cp -f /opt/zentto-dev/nginx/zentto-proxy.conf /etc/nginx/zentto-proxy.conf
            ln -sf /etc/nginx/sites-available/zentto-dev.conf /etc/nginx/sites-enabled/zentto-dev.conf
            nginx -t && systemctl reload nginx

            echo "✅ API DEV deployed → apidev.zentto.net (espejo de prod con BD zentto_dev)"

  # set-private omitido — los workflows de prod manejan la visibilidad del repo
