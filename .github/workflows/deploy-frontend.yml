name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - 'web/modular-frontend/**'
      - 'docker/Dockerfile.frontend'
      - 'docker/pm2.config.cjs'
      - 'docker-compose.prod.yml'
      - 'nginx/zentto.conf'
  workflow_dispatch:

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/zentto-erp/zentto-web/frontend:latest

jobs:
  build:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force
          df -h /

      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api.zentto.net
            NEXT_PUBLIC_API_BASE=https://api.zentto.net
            NEXT_PUBLIC_API_URL=https://api.zentto.net
            NEXT_PUBLIC_BACKEND_URL=https://api.zentto.net
            NEXT_PUBLIC_SHELL_URL=https://app.zentto.net
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=0x4AAAAAACsUe-s-UNo9WDiI
            NEXT_PUBLIC_PADDLE_CLIENT_TOKEN=live_8c250213a8ec06eb59974f48296

  deploy:
    name: Deploy Frontend to server
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml,nginx/zentto.conf,docker/pm2.config.cjs
          target: /opt/zentto/

      - uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GITHUB_ACTOR,AUTH_SECRET
          script: |
            set -e
            cd /opt/zentto
            # Garantizar .env.frontend con AUTH_SECRET desde GitHub Secrets
            ENV_FE="/opt/zentto/.env.frontend"
            if [ ! -f "$ENV_FE" ]; then
              touch "$ENV_FE"
              chmod 600 "$ENV_FE"
            fi
            if [ -n "$AUTH_SECRET" ]; then
              if grep -q '^AUTH_SECRET=' "$ENV_FE"; then
                sed -i "s|^AUTH_SECRET=.*|AUTH_SECRET=$AUTH_SECRET|" "$ENV_FE"
              else
                echo "AUTH_SECRET=$AUTH_SECRET" >> "$ENV_FE"
              fi
              echo "✓ AUTH_SECRET sincronizado en .env.frontend"
            fi
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            docker compose -f docker-compose.prod.yml pull frontend
            docker compose -f docker-compose.prod.yml up -d --no-deps frontend
            docker image prune -f
            # Actualizar Nginx config si cambió
            if [ -f /opt/zentto/nginx/zentto.conf ]; then
              cp /opt/zentto/nginx/zentto.conf /etc/nginx/sites-available/zentto.conf 2>/dev/null || true
              nginx -t && systemctl reload nginx 2>/dev/null || true
              echo "✓ Nginx config actualizada"
            fi
            echo "✓ Frontend desplegado: $(date -u)"
