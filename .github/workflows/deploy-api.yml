name: Deploy API

on:
  push:
    branches: [main]
    paths:
      - 'web/api/**'
      - 'docker/Dockerfile.api'
      - 'docker-compose.prod.yml'
  workflow_dispatch:

concurrency:
  group: deploy-api
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/zentto-erp/zentto-web/api:latest

jobs:
  build:
    name: Build & Push API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ env.IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  migrate-pg:
    name: Run PostgreSQL migrations
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "web/api/sqlweb-pg,web/api/scripts"
          target: /opt/zentto/
          strip_components: 2

      - uses: appleboy/ssh-action@v1.0.3
        env:
          PG_PASSWORD: ${{ secrets.PG_PASSWORD }}
          PG_USER: ${{ secrets.PG_USER }}
          PG_DATABASE: ${{ secrets.PG_DATABASE }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: PG_PASSWORD,PG_USER,PG_DATABASE
          script: |
            set -e
            # Run DDL-level changes that require superuser/table-owner (via postgres)
            echo "GRANT CREATE ON SCHEMA acct, ap, ar, audit, cfg, doc, fin, fiscal, hr, master, pay, pos, public, rest, sec, store TO zentto_app;" > /tmp/zentto_ddl.sql
            echo 'ALTER TABLE acct."JournalEntryLine" ADD COLUMN IF NOT EXISTS "CostCenterCode" VARCHAR(20) NULL;' >> /tmp/zentto_ddl.sql
            su -c "psql -d $PG_DATABASE -f /tmp/zentto_ddl.sql" postgres || echo "DDL grants warning (may already be applied)"
            rm -f /tmp/zentto_ddl.sql
            chmod +x /opt/zentto/scripts/run-pg-migrations.sh
            PGPASSWORD="$PG_PASSWORD" /opt/zentto/scripts/run-pg-migrations.sh \
              "$PG_USER" 127.0.0.1 "$PG_DATABASE" /opt/zentto/sqlweb-pg
            echo "✓ Migraciones PG ejecutadas: $(date -u)"

  deploy:
    name: Deploy API to server
    needs: migrate-pg
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.prod.yml
          target: /opt/zentto/

      - uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN,GITHUB_ACTOR,NOTIFY_API_KEY
          script: |
            set -e
            NEW_KEY="ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJ/QVi9dbf2PRV73J9LvxyMAVp9/RQDFL/sfd2hLhsPg zentto-server"
            grep -qF "$NEW_KEY" ~/.ssh/authorized_keys 2>/dev/null || echo "$NEW_KEY" >> ~/.ssh/authorized_keys

            # ── Firewall: Docker (172.18.x) → PostgreSQL ──
            if ! ufw status | grep -q '172.18.0.0/16.*5432'; then
              ufw allow from 172.18.0.0/16 to any port 5432 comment 'Docker zentto-net to PostgreSQL'
              echo "✓ UFW rule added: Docker→PG"
            fi
            if ! iptables -L DOCKER-USER -n 2>/dev/null | grep -q '172.18.0.0/16.*5432'; then
              iptables -I DOCKER-USER -s 172.18.0.0/16 -p tcp --dport 5432 -j ACCEPT
              echo "✓ iptables DOCKER-USER rule added"
            fi
            # Persist iptables rule across reboots
            if ! grep -q 'Docker PostgreSQL zentto' /etc/ufw/after.rules 2>/dev/null; then
              sed -i '/^COMMIT$/i -A DOCKER-USER -s 172.18.0.0/16 -p tcp --dport 5432 -j ACCEPT # Docker PostgreSQL zentto' /etc/ufw/after.rules
              echo "✓ iptables rule persisted in ufw/after.rules"
            fi

            # ── pg_hba.conf: allow Docker network ──
            PG_HBA=$(find /etc/postgresql -name pg_hba.conf 2>/dev/null | head -1)
            if [ -n "$PG_HBA" ] && ! grep -q '172.18.0.0/16' "$PG_HBA"; then
              echo 'host    zentto_prod    zentto_app    172.18.0.0/16    scram-sha-256' >> "$PG_HBA"
              systemctl reload postgresql
              echo "✓ pg_hba.conf updated for Docker network"
            fi

            # ── Nginx CORS for api.zentto.net ──
            NGINX_CONF="/etc/nginx/sites-available/zentto"
            if [ -f "$NGINX_CONF" ] && ! grep -q 'Access-Control-Allow-Origin' "$NGINX_CONF"; then
              echo "⚠ Nginx CORS missing — update /etc/nginx/sites-available/zentto manually"
              echo "  See: nginx/zentto.conf in repo for reference config with CORS"
            fi

            # ── Mail config (Zentto Notify webhook) ──
            ENV_API="/opt/zentto/.env.api"
            if [ -f "$ENV_API" ]; then
              # Ensure mail webhook is configured
              if ! grep -q '^AUTH_MAIL_WEBHOOK_URL=' "$ENV_API"; then
                echo '' >> "$ENV_API"
                echo '# Mail delivery via Zentto Notify' >> "$ENV_API"
                echo 'AUTH_MAIL_WEBHOOK_URL=https://notify.zentto.net/api/email/send' >> "$ENV_API"
                echo "AUTH_MAIL_WEBHOOK_TOKEN=$NOTIFY_API_KEY" >> "$ENV_API"
                echo 'MAIL_FROM=Zentto <no-reply@zentto.net>' >> "$ENV_API"
                echo "✓ Mail webhook configured in .env.api"
              else
                # Update token if it changed
                sed -i "s|^AUTH_MAIL_WEBHOOK_TOKEN=.*|AUTH_MAIL_WEBHOOK_TOKEN=$NOTIFY_API_KEY|" "$ENV_API"
                echo "✓ Mail webhook token updated"
              fi
              # Ensure STORE_URL is set for ecommerce emails
              if ! grep -q '^STORE_URL=' "$ENV_API"; then
                echo 'STORE_URL=https://app.zentto.net' >> "$ENV_API"
                echo "✓ STORE_URL added"
              fi
            fi

            # ── Deploy container ──
            cd /opt/zentto
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            docker compose -f docker-compose.prod.yml pull api
            # Remover contenedor existente si fue creado fuera de compose
            docker rm -f zentto-api 2>/dev/null || true
            docker compose -f docker-compose.prod.yml up -d --no-deps api
            docker image prune -f
            echo "✓ API desplegada: $(date -u)"
