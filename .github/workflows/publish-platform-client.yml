name: Publish @zentto/platform-client

on:
  push:
    branches: [main]
    paths:
      - "web/platform-client/**"
      - ".github/workflows/publish-platform-client.yml"
  workflow_dispatch:

jobs:
  publish:
    name: Build & publish to npm
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: web/platform-client
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Typecheck + test + build
        run: |
          npx tsc --noEmit
          npm test
          npm run build

      # Salta silenciosamente si la versión del package.json ya está publicada.
      # Solo publica cuando alguien bumpeó web/platform-client/package.json.
      #
      # Workaround dos bugs de npm (ver publish-landing-kit.yml para detalle):
      #   1. `npm publish` dentro de un workspace monorepo → 404 persistente.
      #      Copiamos el paquete a $RUNNER_TEMP para aislar la request.
      #   2. `npm publish` en prereleases requiere `--tag <tag>` explícito.
      - name: Publish if new version
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN_PLATFORM_CLIENT || secrets.NPM_TOKEN }}
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          # Chequear versión EXACTA (ver comentario en publish-landing-kit.yml).
          if npm view "@zentto/platform-client@$PKG_VERSION" version >/dev/null 2>&1; then
            echo "✓ Version $PKG_VERSION ya publicada — skip."
            exit 0
          fi
          echo "Publicando @zentto/platform-client@$PKG_VERSION..."

          PUBLISH_ARGS="--access restricted --ignore-scripts"
          if [[ "$PKG_VERSION" == *-* ]]; then
            PUBLISH_ARGS="$PUBLISH_ARGS --tag beta"
          fi

          PUBLISH_DIR="${RUNNER_TEMP:-/tmp}/pkg-publish-platform-client"
          rm -rf "$PUBLISH_DIR"
          mkdir -p "$PUBLISH_DIR"
          cp -r package.json dist "$PUBLISH_DIR/"
          if [ -f README.md ]; then cp README.md "$PUBLISH_DIR/"; fi

          # Remover prepublishOnly/prepare para que npm publish no reconstruya.
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('$PUBLISH_DIR/package.json','utf8'));
            if (p.scripts) {
              delete p.scripts.prepublishOnly;
              delete p.scripts.prepare;
              delete p.scripts.prepack;
            }
            fs.writeFileSync('$PUBLISH_DIR/package.json', JSON.stringify(p, null, 2) + '\n');
          "

          cd "$PUBLISH_DIR"
          npm publish $PUBLISH_ARGS
          echo "✓ Publicado @zentto/platform-client@$PKG_VERSION"
