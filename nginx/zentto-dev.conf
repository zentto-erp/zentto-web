# ─────────────────────────────────────────────────────────────────────
#  Zentto DEV — Nginx reverse proxy for dev environment
#
#  Incluir en nginx.conf o sites-enabled junto a zentto.conf
#  Los puertos dev están offset +100 respecto a producción
# ─────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect ────────────────────────────────────────────
server {
    listen 80;
    server_name dev.zentto.net app.dev.zentto.net api.dev.zentto.net;
    return 301 https://$host$request_uri;
}

# ── Frontend DEV (app.dev.zentto.net / dev.zentto.net) ───────────────
server {
    listen 443 ssl;
    server_name dev.zentto.net app.dev.zentto.net;

    ssl_certificate     /etc/letsencrypt/live/zentto.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zentto.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 20M;

    # ── Sub-apps (offset +100: 3103=pos, 3106=ventas, etc.) ──────────
    location /pos          { proxy_pass http://127.0.0.1:3103; include /etc/nginx/zentto-proxy.conf; }
    location /ventas       { proxy_pass http://127.0.0.1:3106; include /etc/nginx/zentto-proxy.conf; }
    location /restaurante  { proxy_pass http://127.0.0.1:3108; include /etc/nginx/zentto-proxy.conf; }
    location /ecommerce    { proxy_pass http://127.0.0.1:3109; include /etc/nginx/zentto-proxy.conf; }
    location /auditoria    { proxy_pass http://127.0.0.1:3110; include /etc/nginx/zentto-proxy.conf; }
    location /logistica    { proxy_pass http://127.0.0.1:3111; include /etc/nginx/zentto-proxy.conf; }
    location /crm          { proxy_pass http://127.0.0.1:3112; include /etc/nginx/zentto-proxy.conf; }
    location /manufactura  { proxy_pass http://127.0.0.1:3113; include /etc/nginx/zentto-proxy.conf; }
    location /flota        { proxy_pass http://127.0.0.1:3114; include /etc/nginx/zentto-proxy.conf; }
    location /shipping     { proxy_pass http://127.0.0.1:3115; include /etc/nginx/zentto-proxy.conf; }

    # ── Shell (catch-all) ────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3100;
        include /etc/nginx/zentto-proxy.conf;
    }
}

# ── API DEV (api.dev.zentto.net) ─────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.dev.zentto.net;

    ssl_certificate     /etc/letsencrypt/live/zentto.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zentto.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 20M;

    # ── CORS ─────────────────────────────────────────────────────────
    set $cors_origin "";
    if ($http_origin ~* "^https://(dev\.zentto\.net|app\.dev\.zentto\.net)$") {
        set $cors_origin $http_origin;
    }

    # Preflight
    if ($request_method = 'OPTIONS') {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With, X-Company-Id, X-Branch-Id, X-Timezone, X-Country-Code, X-Master-Key, X-API-Key, X-Backoffice-Token' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Max-Age' '86400' always;
        add_header 'Content-Length' 0;
        return 204;
    }

    location / {
        proxy_pass http://127.0.0.1:4200;

        # Remove backend CORS headers (Nginx handles it)
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;

        # Set CORS
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With, X-Company-Id, X-Branch-Id, X-Timezone, X-Country-Code, X-Master-Key, X-API-Key, X-Backoffice-Token' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Disposition, X-Total-Count, x-datetime-storage, x-datetime-country, x-datetime-timezone' always;

        include /etc/nginx/zentto-proxy.conf;
    }
}
