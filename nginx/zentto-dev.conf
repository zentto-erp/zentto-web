# ─────────────────────────────────────────────────────────────────────
#  Zentto DEV — Nginx reverse proxy for dev environment
#
#  Incluir en nginx.conf o sites-enabled junto a zentto.conf
#  Los puertos dev están offset +100 respecto a producción
# ─────────────────────────────────────────────────────────────────────

# ── HTTP → HTTPS redirect ────────────────────────────────────────────
server {
    listen 80;
    server_name dev.zentto.net app.dev.zentto.net api.dev.zentto.net;
    return 301 https://$host$request_uri;
}

# ── Frontend DEV (app.dev.zentto.net / dev.zentto.net) ───────────────
server {
    listen 443 ssl;
    server_name dev.zentto.net app.dev.zentto.net;

    ssl_certificate     /etc/letsencrypt/live/zentto.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zentto.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 20M;

    # ── Sub-apps (offset +200: interno 300X → externo 320X) ────────
    location /contabilidad { proxy_pass http://127.0.0.1:3201; include /etc/nginx/zentto-proxy.conf; }
    location /nomina       { proxy_pass http://127.0.0.1:3202; include /etc/nginx/zentto-proxy.conf; }
    location /pos          { proxy_pass http://127.0.0.1:3203; include /etc/nginx/zentto-proxy.conf; }
    location /bancos       { proxy_pass http://127.0.0.1:3204; include /etc/nginx/zentto-proxy.conf; }
    location /inventario   { proxy_pass http://127.0.0.1:3205; include /etc/nginx/zentto-proxy.conf; }
    location /ventas       { proxy_pass http://127.0.0.1:3206; include /etc/nginx/zentto-proxy.conf; }
    location /compras      { proxy_pass http://127.0.0.1:3207; include /etc/nginx/zentto-proxy.conf; }
    location /restaurante  { proxy_pass http://127.0.0.1:3208; include /etc/nginx/zentto-proxy.conf; }
    location /ecommerce    { proxy_pass http://127.0.0.1:3209; include /etc/nginx/zentto-proxy.conf; }
    location /auditoria    { proxy_pass http://127.0.0.1:3210; include /etc/nginx/zentto-proxy.conf; }
    location /logistica    { proxy_pass http://127.0.0.1:3211; include /etc/nginx/zentto-proxy.conf; }
    location /crm          { proxy_pass http://127.0.0.1:3212; include /etc/nginx/zentto-proxy.conf; }
    location /manufactura  { proxy_pass http://127.0.0.1:3213; include /etc/nginx/zentto-proxy.conf; }
    location /flota        { proxy_pass http://127.0.0.1:3214; include /etc/nginx/zentto-proxy.conf; }
    location /shipping     { proxy_pass http://127.0.0.1:3215; include /etc/nginx/zentto-proxy.conf; }
    location /report-studio { proxy_pass http://127.0.0.1:3217; include /etc/nginx/zentto-proxy.conf; }

    # ── Shell (catch-all) ────────────────────────────────────────────
    location / {
        proxy_pass http://127.0.0.1:3200;
        include /etc/nginx/zentto-proxy.conf;
    }
}

# ── API DEV (api.dev.zentto.net) ─────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.dev.zentto.net;

    ssl_certificate     /etc/letsencrypt/live/zentto.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zentto.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 20M;

    location / {
        # CORS origin detection
        set $cors_origin "";
        if ($http_origin ~* "^https://(dev\.zentto\.net|app\.dev\.zentto\.net)$") {
            set $cors_origin $http_origin;
        }

        # Preflight OPTIONS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With, X-Company-Id, X-Branch-Id, X-Timezone, X-Country-Code, X-Master-Key, X-API-Key, X-Backoffice-Token' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' '86400' always;
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://127.0.0.1:4200;

        # Remove backend CORS headers (Nginx handles it)
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Allow-Credentials;

        # Set CORS
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With, X-Company-Id, X-Branch-Id, X-Timezone, X-Country-Code, X-Master-Key, X-API-Key, X-Backoffice-Token' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Disposition, X-Total-Count, x-datetime-storage, x-datetime-country, x-datetime-timezone' always;

        include /etc/nginx/zentto-proxy.conf;
    }
}
