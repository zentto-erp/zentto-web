# ── Zentto Nginx — Reverse Proxy ──────────────────────────────────────────────
# app.zentto.net  → Frontend ERP shell (port 3000)
# api.zentto.net  → API Node/Express (port 4000)

# ── Frontend ERP (app.zentto.net) ──────────────────────────────────────────────
server {
    listen 80;
    server_name app.zentto.net zentto.net www.zentto.net localhost;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── API con CORS ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.zentto.net;

    client_max_body_size 20M;

    location / {
        # ── CORS headers (siempre presentes, incluso en errores) ──
        set $cors_origin '';
        if ($http_origin ~* "^https://(app\.zentto\.net|zentto\.net|www\.zentto\.net)$") {
            set $cors_origin $http_origin;
        }

        # Preflight OPTIONS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,x-timezone,x-country-code' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            return 204;
        }

        # CORS en respuestas normales (always = incluso en 4xx/5xx)
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,x-timezone,x-country-code' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;

        # Proxy a la API
        proxy_pass         http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
