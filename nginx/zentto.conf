# ── Zentto Nginx — Reverse Proxy ──────────────────────────────────────────────
# zentto.net / www.zentto.net  → Landing (Cloudflare Pages, no pasa por aquí)
# app.zentto.net               → Frontend ERP shell (port 3000)
# api.zentto.net               → API Node/Express (port 4000)
#
# En producción el servidor tiene Nginx con certbot para SSL.
# Este archivo es para el contenedor nginx local (sin SSL).

# ── Frontend ERP (app.zentto.net) ──────────────────────────────────────────────
server {
    listen 80;
    server_name app.zentto.net localhost;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── API ────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.zentto.net;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── Micro-apps (acceso interno/directo por puerto) ────────────────────────────
# contabilidad=3001 nomina=3002 pos=3003 bancos=3004 inventario=3005
