# ── Zentto Nginx — Production Reverse Proxy ───────────────────────────────────
# app.zentto.net → Shell (3000) + 5 sub-apps independientes
# api.zentto.net → API Node/Express (4000)
#
# Arquitectura:
#   Shell (3000): maneja /, /authentication, /perfil, /aplicaciones,
#     /contabilidad/*, /nomina/*, /bancos/*, /inventario/*, /compras/*,
#     /facturas, /clientes, /proveedores, /articulos, /cxc, /cxp, /pagos, /abonos
#
#   Sub-apps independientes (basePath propio, NO estan en el shell):
#     /pos → 3003, /ventas → 3006, /restaurante → 3008,
#     /ecommerce → 3009, /auditoria → 3010
#
# SSL: certbot con wildcard zentto.net (Let's Encrypt)

# ── HTTP → HTTPS ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name zentto.net www.zentto.net api.zentto.net app.zentto.net *.zentto.net;
    return 301 https://$host$request_uri;
}

# ── Frontend ERP ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name zentto.net www.zentto.net app.zentto.net *.zentto.net;
    client_max_body_size 20M;

    ssl_certificate     /etc/letsencrypt/live/zentto.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zentto.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Buffers para NextAuth — JWT en cookies supera el default de 8k
    proxy_buffer_size        32k;
    proxy_buffers            8 32k;
    proxy_busy_buffers_size  64k;

    # Sub-apps independientes
    location /pos         { proxy_pass http://127.0.0.1:3003; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_cache_bypass $http_upgrade; }
    location /ventas      { proxy_pass http://127.0.0.1:3006; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_cache_bypass $http_upgrade; }
    location /restaurante { proxy_pass http://127.0.0.1:3008; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_cache_bypass $http_upgrade; }
    location /ecommerce   { proxy_pass http://127.0.0.1:3009; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_cache_bypass $http_upgrade; }
    location /auditoria   { proxy_pass http://127.0.0.1:3010; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_cache_bypass $http_upgrade; }

    # Shell (fallback)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── API (api.zentto.net) ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.zentto.net;
    client_max_body_size 20M;

    ssl_certificate     /etc/letsencrypt/live/zentto.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zentto.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # CORS — Nginx es la unica fuente.
    # proxy_hide_header elimina los headers que manda Express (cors middleware)
    # para evitar: "header contains multiple values"
    # Las maquinas fiscales (agente local) llaman directo a localhost:7654,
    # NO pasan por aqui — este bloque solo aplica a peticiones web desde browser.
    set $cors_origin "";
    if ($http_origin ~* "^https://[a-z0-9-]+\.zentto\.net$") {
        set $cors_origin $http_origin;
    }
    if ($http_origin = "https://zentto.net")     { set $cors_origin $http_origin; }
    if ($http_origin = "https://www.zentto.net") { set $cors_origin $http_origin; }
    if ($http_origin = "https://app.zentto.net") { set $cors_origin $http_origin; }

    location / {
        # Preflight OPTIONS — responder sin pasar al backend
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, X-Requested-With, X-Company-Id, X-Branch-Id, X-Timezone, X-Country-Code, X-Master-Key, X-API-Key' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age'           86400 always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type'  'text/plain';
            return 204;
        }

        # Ocultar headers CORS del upstream para evitar duplicados
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Credentials;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        proxy_hide_header Access-Control-Expose-Headers;

        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        # Nginx agrega CORS una sola vez
        add_header 'Access-Control-Allow-Origin'      $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Expose-Headers'    'Content-Disposition, X-Total-Count, x-datetime-storage, x-datetime-country, x-datetime-timezone' always;
    }
}
