# ── Zentto Nginx — Production Reverse Proxy ───────────────────────────────────
# app.zentto.net → Shell (3000) + 5 sub-apps independientes
# api.zentto.net → API Node/Express (4000)
#
# Arquitectura:
#   Shell (3000): maneja /, /authentication, /perfil, /aplicaciones,
#     /contabilidad/*, /nomina/*, /bancos/*, /inventario/*, /compras/*,
#     /facturas, /clientes, /proveedores, /articulos, /cxc, /cxp, /pagos, /abonos
#
#   Sub-apps independientes (basePath propio, NO estan en el shell):
#     /pos → 3003, /ventas → 3006, /restaurante → 3008,
#     /ecommerce → 3009, /auditoria → 3010, /logistica → 3011,
#     /crm → 3012, /manufactura → 3013, /flota → 3014,
#     /shipping → 3015 (portal clientes paquetería)
#
# SSL: certbot con wildcard zentto.net (Let's Encrypt)

# ── HTTP → HTTPS ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name zentto.net www.zentto.net api.zentto.net app.zentto.net *.zentto.net;
    return 301 https://$host$request_uri;
}

# ── Frontend ERP ──────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name zentto.net www.zentto.net app.zentto.net *.zentto.net;
    client_max_body_size 20M;

    ssl_certificate     /etc/letsencrypt/live/zentto.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zentto.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ── Sub-apps independientes (NOT in shell) ──
    location /pos         { proxy_pass http://127.0.0.1:3003; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_cache_bypass $http_upgrade; }
    location /ventas      { proxy_pass http://127.0.0.1:3006; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_cache_bypass $http_upgrade; }
    location /restaurante { proxy_pass http://127.0.0.1:3008; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_cache_bypass $http_upgrade; }
    location /ecommerce   { proxy_pass http://127.0.0.1:3009; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_cache_bypass $http_upgrade; }
    location /auditoria   { proxy_pass http://127.0.0.1:3010; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_cache_bypass $http_upgrade; }
    location /logistica   { proxy_pass http://127.0.0.1:3011; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_cache_bypass $http_upgrade; }
    location /crm         { proxy_pass http://127.0.0.1:3012; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_cache_bypass $http_upgrade; }
    location /manufactura { proxy_pass http://127.0.0.1:3013; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_cache_bypass $http_upgrade; }
    location /flota       { proxy_pass http://127.0.0.1:3014; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_cache_bypass $http_upgrade; }
    location /shipping    { proxy_pass http://127.0.0.1:3015; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection 'upgrade'; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; proxy_set_header X-Forwarded-Proto https; proxy_cache_bypass $http_upgrade; }

    # ── Buffers para JWT grande (auth.js divide sesion en multiples cookies) ──
    proxy_buffer_size       64k;
    proxy_buffers           8 64k;
    proxy_busy_buffers_size 128k;

    # ── Shell (fallback — todo lo demas) ──
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── Vaultwarden (vault.zentto.net) ───────────────────────────────────────────
server {
    listen 443 ssl;
    server_name vault.zentto.net;

    ssl_certificate     /etc/letsencrypt/live/zentto.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zentto.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 10M;

    location / {
        proxy_pass         http://127.0.0.1:8222;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}

# ── API (api.zentto.net) ──────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.zentto.net;
    client_max_body_size 20M;

    ssl_certificate     /etc/letsencrypt/live/zentto.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/zentto.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ── CORS para subdominios dinamicos de tenants ──
    # Nginx maneja CORS aqui para que incluso errores (502, 504) lleven los headers
    set $cors_origin "";
    if ($http_origin ~* "^https://[a-z0-9-]+\.zentto\.net$") {
        set $cors_origin $http_origin;
    }
    # Origenes fijos conocidos
    if ($http_origin = "https://zentto.net") {
        set $cors_origin $http_origin;
    }
    if ($http_origin = "https://www.zentto.net") {
        set $cors_origin $http_origin;
    }
    if ($http_origin = "https://app.zentto.net") {
        set $cors_origin $http_origin;
    }

    location / {
        # Preflight OPTIONS — responder directo sin pasar al backend
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With, X-Company-Id, X-Branch-Id, X-Timezone, X-Country-Code, X-Master-Key, X-API-Key' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Length' 0;
            add_header 'Content-Type' 'text/plain';
            return 204;
        }

        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;

        # Eliminar headers CORS del upstream (Express también los agrega → duplicado)
        proxy_hide_header 'Access-Control-Allow-Origin';
        proxy_hide_header 'Access-Control-Allow-Credentials';
        proxy_hide_header 'Access-Control-Expose-Headers';

        # CORS headers en TODAS las respuestas (incluye errores 4xx/5xx)
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Disposition, X-Total-Count, x-datetime-storage, x-datetime-country, x-datetime-timezone' always;
    }
}
